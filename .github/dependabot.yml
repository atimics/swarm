# Dependabot configuration for aws-swarm monorepo
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Uses a single root entry for all npm workspaces. pnpm resolves
# sub-package deps from the workspace root, so per-directory entries
# just produce conflicting lockfile PRs that break frozen-lockfile CI.

version: 2
updates:
  # ── npm (all workspaces via root) ──────────────────────────────────
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Serialize dependabot: one open PR per ecosystem at a time. See #1389.
    # Prevents the "each PR passes alone but breaks in combination" lockfile
    # flood observed on 2026-03-27. Tune up once merge queue is available.
    open-pull-requests-limit: 1
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - "type:security"
      - "priority:medium"

  # ── GitHub Actions ─────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Serialize dependabot: one open PR per ecosystem at a time. See #1389.
    # Prevents the "each PR passes alone but breaks in combination" lockfile
    # flood observed on 2026-03-27. Tune up once merge queue is available.
    open-pull-requests-limit: 1
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - "type:security"
      - "type:infra"
