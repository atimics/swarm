name: Task
description: A development task or chore
title: "[Task]: "
labels: ["type:chore", "priority:medium"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Use this template for development tasks, refactoring, or chores.
        See [ISSUE-GOVERNANCE.md](../../docs/ISSUE-GOVERNANCE.md) for priority criteria and agent-ready issue guidelines.

  - type: dropdown
    id: type
    attributes:
      label: Task Type
      description: What kind of task is this?
      options:
        - refactor - Code improvement
        - chore - Maintenance task
        - ci - CI/CD changes
        - docs - Documentation
        - test - Testing
        - deps - Dependencies
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package does this affect?
      options:
        - core
        - handlers
        - admin-api
        - admin-ui
        - infra
        - mcp-server
        - profile-page
        - claude-code-worker
        - layer
        - multiple/all
        - none
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
      placeholder: We need to...
    validations:
      required: true

  - type: textarea
    id: scope-boundaries
    attributes:
      label: Scope Boundaries
      description: |
        What files, services, or subsystems should this task touch?
        What must NOT be changed? This prevents agent drift.
      placeholder: |
        **In scope:**
        - packages/core/src/services/llm.ts
        - packages/core/src/services/llm.test.ts

        **Out of scope:**
        - Do not refactor unrelated services
        - Do not change public API signatures
    validations:
      required: false

  - type: textarea
    id: non-goals
    attributes:
      label: Non-Goals
      description: |
        What is explicitly NOT part of this task? Listing non-goals
        prevents scope creep and keeps agent work focused.
      placeholder: |
        - Do not add new features as part of this refactor
        - Performance benchmarking is a separate issue
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Concrete, verifiable criteria. How do we know this is done?
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
        - [ ] All existing tests still pass
    validations:
      required: true

  - type: textarea
    id: validation-commands
    attributes:
      label: Validation Commands
      description: |
        Commands an agent or reviewer can run to verify completion.
        Include test commands, build commands, and any manual checks.
      placeholder: |
        ```bash
        bun test packages/core/
        pnpm build
        pnpm lint
        ```
      render: shell
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any other context
    validations:
      required: false
