name: Bug Report
description: Report a bug in AWS Swarm
title: "[Bug]: "
labels: ["type:bug", "priority:medium"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the information below.
        See [ISSUE-GOVERNANCE.md](../../docs/ISSUE-GOVERNANCE.md) for priority criteria and agent-ready issue guidelines.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - core
        - handlers
        - admin-api
        - admin-ui
        - infra
        - mcp-server
        - profile-page
        - claude-code-worker
        - layer
        - unknown
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - critical - System is unusable
        - high - Major feature broken
        - medium - Feature partially broken
        - low - Minor inconvenience
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
      placeholder: When I try to...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: scope-boundaries
    attributes:
      label: Scope Boundaries
      description: |
        What files, services, or subsystems should the fix touch?
        What must NOT be changed? This prevents agent drift.
      placeholder: |
        **In scope:**
        - packages/core/src/services/memory.ts
        - packages/handlers/src/message-processor.ts

        **Out of scope:**
        - Do not modify DynamoDB table schemas
        - Do not change the public API contract
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Concrete, verifiable criteria for the fix to be considered complete.
      placeholder: |
        - [ ] Error no longer occurs when reproducing steps above
        - [ ] Existing tests pass without modification
        - [ ] New regression test added for this scenario
    validations:
      required: true

  - type: textarea
    id: validation-commands
    attributes:
      label: Validation Commands
      description: |
        Commands an agent or reviewer can run to verify the fix.
        Include test commands, build commands, and any manual checks.
      placeholder: |
        ```bash
        bun test packages/core/src/services/memory.test.ts
        pnpm build
        pnpm lint
        ```
      render: shell
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Any relevant error messages or logs
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser, etc.
      placeholder: |
        - Node: 20.x
        - OS: macOS 14
        - Browser: Chrome 120
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: This issue includes acceptance criteria and validation steps
          required: false
