name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Type check
        run: pnpm -r run --if-present typecheck
        continue-on-error: true

      - name: Test
        run: pnpm -r run --if-present test
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/*/dist
            packages/admin-ui/dist
          retention-days: 7

  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: CDK Synth
        working-directory: packages/infra
        run: npx cdk synth --quiet
        env:
          # Dummy values for synth (not actual deployment)
          AWS_ACCOUNT_ID: '000000000000'
          AWS_REGION: 'us-east-1'

      - name: Upload CDK output
        uses: actions/upload-artifact@v4
        with:
          name: cdk-out
          path: packages/infra/cdk.out
          retention-days: 7
