name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run --if-present lint

      - name: Check circular dependencies
        run: pnpm check:circular

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        env:
          VITE_API_URL: /api
          VITE_CROSSMINT_PROJECT_ID: ${{ secrets.VITE_CROSSMINT_PROJECT_ID }}
          VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID }}
        run: pnpm -r build

      - name: Validate build artifacts exist
        run: |
          MISSING=0

          for PKG_DIR in packages/*/; do
            PKG_NAME=$(basename "$PKG_DIR")

            # Skip packages that do not produce dist/ output
            case "$PKG_NAME" in
              plan-tests|layer|infra) continue ;;
            esac

            if [ -f "$PKG_DIR/tsconfig.json" ] || [ -f "$PKG_DIR/vite.config.ts" ] || [ -f "$PKG_DIR/vite.config.mts" ]; then
              if [ ! -d "$PKG_DIR/dist" ]; then
                echo "::error::Missing build output: $PKG_DIR/dist"
                MISSING=1
              fi
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo "::error::One or more packages failed to produce build artifacts."
            exit 1
          fi
          echo "All expected build artifacts present."

      - name: Upload build artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: build-output
          path: packages/*/dist
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Download build artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: build-output
          path: packages

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: |
          bun test --coverage --coverage-reporter=text --coverage-reporter=lcov 2>&1 | tee /tmp/coverage-output.txt

      - name: Enforce coverage threshold (40%)
        run: ./scripts/check-coverage.sh /tmp/coverage-output.txt 40

  # Unified gate: configure this as the single required status check
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - build
      - test
    steps:
      - name: Evaluate gate results
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          ALL_PASSED=true

          for check in \
            "Lint:${{ needs.lint.result }}" \
            "Build:${{ needs.build.result }}" \
            "Test:${{ needs.test.result }}"; do
            name="${check%%:*}"
            result="${check#*:}"
            if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
              echo "| $name | Passed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $name | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
              ALL_PASSED=false
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$ALL_PASSED" = "false" ]; then
            echo "::error::CI gate FAILED. One or more required checks did not pass."
            echo "**CI: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "**CI: PASSED**" >> "$GITHUB_STEP_SUMMARY"
