name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/ticket-health.yml'
      - '.github/workflows/security-exceptions.yml'
      - '.github/workflows/gtm-kpi-report.yml'
      - '.github/workflows/leadership-scorecard.yml'
      - '.github/workflows/access-review.yml'
      - '.github/workflows/release-notes.yml'
      - 'issues/**'
      - 'scripts/ticket-health-report.sh'
      - 'scripts/leadership-scorecard.sh'
      - 'scripts/access-review.sh'
      - 'scripts/generate-gtm-kpi-report.mjs'
      - 'LICENSE'
      - '.editorconfig'

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run --if-present lint

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Validate security exceptions
        run: node scripts/validate-security-exceptions.mjs --ci

  # Unified gate: configure this as the single required status check.
  #
  # Cost reduction: build-and-test and security audit removed from PR CI.
  # Safety net remains via:
  #   - Local pre-push hooks: lint + build + bun test (full suite)
  #   - Deploy pipeline: full build on every push to main
  #   - Weekly security-exceptions workflow: pnpm audit + exception review
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
    steps:
      - name: Evaluate gate results
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          RESULT="${{ needs.lint.result }}"
          if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
            echo "| Lint | Passed |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**CI: PASSED**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Lint | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::CI gate FAILED. Lint did not pass."
            echo "**CI: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
