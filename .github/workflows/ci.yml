name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/ticket-health.yml'
      - '.github/workflows/security-exceptions.yml'
      - '.github/workflows/gtm-kpi-report.yml'
      - '.github/workflows/leadership-scorecard.yml'
      - '.github/workflows/access-review.yml'
      - '.github/workflows/release-notes.yml'
      - 'issues/**'
      - 'scripts/ticket-health-report.sh'
      - 'scripts/leadership-scorecard.sh'
      - 'scripts/access-review.sh'
      - 'scripts/generate-gtm-kpi-report.mjs'
      - 'LICENSE'
      - '.editorconfig'

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run --if-present lint

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Validate security exceptions
        run: node scripts/validate-security-exceptions.mjs --ci

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (required for tests)
        run: pnpm build

      - name: Test
        run: bun test

  smoke:
    name: Smoke Test (Admin UI)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (TypeScript + Admin UI)
        env:
          VITE_API_URL: /api
          VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID }}
        run: pnpm build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Admin UI smoke test
        run: node scripts/smoke-admin-ui.mjs

  # Unified gate: configure this as the single required status check.
  #
  # Safety net: lint catches code quality issues, smoke test catches UI
  # regressions that would otherwise only be caught by pre-push hooks
  # (which can be bypassed with SKIP_PREPUSH=1).
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - build
      - test
      - smoke
    steps:
      - name: Evaluate gate results
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          FAILED=0

          for CHECK in lint build test smoke; do
            RESULT=""
            case "$CHECK" in
              lint)  RESULT="${{ needs.lint.result }}" ;;
              build) RESULT="${{ needs.build.result }}" ;;
              test)  RESULT="${{ needs.test.result }}" ;;
              smoke) RESULT="${{ needs.smoke.result }}" ;;
            esac

            if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
              echo "| $CHECK | Passed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $CHECK | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "1" ]; then
            echo "::error::CI gate FAILED. One or more checks did not pass."
            echo "**CI: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "**CI: PASSED**" >> "$GITHUB_STEP_SUMMARY"
          fi
