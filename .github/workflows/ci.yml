name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/ticket-health.yml'
      - '.github/workflows/security-exceptions.yml'
      - '.github/workflows/gtm-kpi-report.yml'
      - '.github/workflows/leadership-scorecard.yml'
      - '.github/workflows/access-review.yml'
      - '.github/workflows/release-notes.yml'
      - 'issues/**'
      - 'scripts/ticket-health-report.sh'
      - 'scripts/leadership-scorecard.sh'
      - 'scripts/access-review.sh'
      - 'scripts/generate-gtm-kpi-report.mjs'
      - 'LICENSE'
      - '.editorconfig'
  # Required for GitHub's merge queue to validate PRs against main + prior
  # queued PRs before they land, preventing the "each PR passes alone but
  # breaks in combination" failure class (see #1223).
  merge_group:
    branches: [main]

concurrency:
  # PR runs cancel each other (latest push wins). Merge-queue runs must not
  # cancel — each queued head commit has to finish for the queue to progress.
  group: ci-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run --if-present lint

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Validate security exceptions
        run: node scripts/validate-security-exceptions.mjs --ci

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove stale CDK build artifacts
        # cdk.out (from prior builds or local dev) contains bundled Lambda copies
        # of source files that Bun's test discovery would pick up, causing
        # spurious failures. Safe to remove — CDK snapshot tests synthesize
        # stacks internally.
        run: rm -rf packages/infra/cdk.out

      - name: Test
        run: pnpm test

  smoke:
    name: Smoke Test (Admin UI)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (TypeScript + Admin UI)
        env:
          VITE_API_URL: /api
          VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID }}
        run: pnpm build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Admin UI smoke test
        run: node scripts/smoke-admin-ui.mjs

  # Unified gate: configure this as the single required status check.
  #
  # Safety net: lint catches code quality issues, smoke test catches UI
  # regressions that would otherwise only be caught by pre-push hooks
  # (which can be bypassed with SKIP_PREPUSH=1).
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - build
      - test
      - smoke
    steps:
      - name: Evaluate gate results
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          FAILED=0

          for CHECK in lint build test smoke; do
            RESULT=""
            case "$CHECK" in
              lint)  RESULT="${{ needs.lint.result }}" ;;
              build) RESULT="${{ needs.build.result }}" ;;
              test)  RESULT="${{ needs.test.result }}" ;;
              smoke) RESULT="${{ needs.smoke.result }}" ;;
            esac

            if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
              echo "| $CHECK | Passed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $CHECK | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "1" ]; then
            echo "::error::CI gate FAILED. One or more checks did not pass."
            echo "**CI: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "**CI: PASSED**" >> "$GITHUB_STEP_SUMMARY"
          fi
