name: CI

# Branch protection requires the `CI` status context on `main`. If we
# path-ignore docs-only PRs here, the status is never posted and the PR
# ends up BLOCKED and needs admin-merge. Instead, the workflow runs on
# every PR and the `changes` job tags docs-only PRs so the expensive
# lint/build/test/smoke jobs skip. The final `ci` gate treats skipped as
# passing, so docs-only PRs still post a green `CI` status. See #1387.
on:
  pull_request:
    branches: [main]
  # Required for GitHub's merge queue to validate PRs against main + prior
  # queued PRs before they land, preventing the "each PR passes alone but
  # breaks in combination" failure class (see #1223).
  merge_group:
    branches: [main]

concurrency:
  # PR runs cancel each other (latest push wins). Merge-queue runs must not
  # cancel — each queued head commit has to finish for the queue to progress.
  group: ci-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # Detect whether this PR touches any runtime-relevant file. If every
  # changed file matches the legacy paths-ignore list (docs, issues, a few
  # agent-only scripts), the downstream code jobs skip. The single `ci`
  # gate at the end treats skipped as pass — so docs-only PRs still post a
  # green `CI` status without burning lint/build/test/smoke minutes. See
  # #1387.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Determine base/head SHAs
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.merge_group.base_sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.merge_group.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify changed files
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          base="${{ steps.sha.outputs.base }}"
          head="${{ steps.sha.outputs.head }}"
          changed=$(git diff --name-only "$base" "$head")
          echo "Changed files:"
          echo "$changed"
          # Regex matches the historical paths-ignore list. Any file NOT
          # matching means code jobs must run.
          ignore_re='^(docs/|[^/]+\.md$|\.github/ISSUE_TEMPLATE/|\.github/workflows/(ticket-health|security-exceptions|gtm-kpi-report|leadership-scorecard|access-review|release-notes)\.yml$|issues/|scripts/(ticket-health-report|leadership-scorecard|access-review)\.sh$|scripts/generate-gtm-kpi-report\.mjs$|LICENSE$|\.editorconfig$)'
          if [ -z "$changed" ] || echo "$changed" | grep -Evq "$ignore_re"; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Classification: code (at least one runtime-relevant file)"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Classification: docs-only (all changed files match paths-ignore)"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run --if-present lint

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Validate security exceptions
        run: node scripts/validate-security-exceptions.mjs --ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Remove stale CDK build artifacts
        # cdk.out (from prior builds or local dev) contains bundled Lambda copies
        # of source files that Bun's test discovery would pick up, causing
        # spurious failures. Safe to remove — CDK snapshot tests synthesize
        # stacks internally.
        run: rm -rf packages/infra/cdk.out

      - name: Test
        run: pnpm test

  smoke:
    name: Smoke Test (Admin UI)
    runs-on: ubuntu-latest
    # No GitHub Environment binding — falls back to the mock VITE_PRIVY_APP_ID
    # in the build step (#1394, #1645). Smoke verifies the UI shell boots,
    # not real auth.
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (TypeScript + Admin UI)
        env:
          VITE_API_URL: /api
          # Fall back to a committed mock ID when the secret isn't available
          # (dependabot PRs don't receive repo/environment secrets). The mock
          # is not a valid Privy app ID — the smoke test only verifies the
          # UI shell boots and doesn't render the "Privy is not configured"
          # banner. Privy auth calls will fail, but the smoke script's
          # allowed-errors list (scripts/smoke-admin-ui.mjs) already tolerates
          # the resulting analytics/iframe errors. See #1394.
          VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID || 'clsmoketest0000000000000' }}
        run: pnpm build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Admin UI smoke test
        run: node scripts/smoke-admin-ui.mjs

  # Observe-only: catches the "each PR passes alone but breaks in combination"
  # lockfile flood by re-merging origin/main into the PR head before frozen
  # install. Not in the required-checks gate (see ci: below) — if it flakes,
  # PRs aren't blocked. Promote to required after one stable week. See #1389.
  lockfile-composes-with-main:
    name: Lockfile composes with main
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Configure merge identity
        run: |
          git config user.email "ci-lockfile-check@local"
          git config user.name "ci-lockfile-check"

      - name: Merge origin/main into PR head
        id: merge
        run: |
          git fetch origin main
          if git merge origin/main --no-edit; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Merge conflict with origin/main — skipping lockfile composition check (PR needs manual rebase anyway)"
            echo "merged=false" >> "$GITHUB_OUTPUT"
            git merge --abort
            exit 0
          fi

      - name: Setup pnpm
        if: steps.merge.outputs.merged == 'true'
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v4

      - name: Setup Node.js
        if: steps.merge.outputs.merged == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install with frozen lockfile against merged tree
        if: steps.merge.outputs.merged == 'true'
        run: pnpm install --frozen-lockfile

  # Unified gate: configure this as the single required status check.
  #
  # Safety net: lint catches code quality issues, smoke test catches UI
  # regressions that would otherwise only be caught by pre-push hooks
  # (which can be bypassed with SKIP_PREPUSH=1).
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - changes
      - lint
      - build
      - test
      - smoke
    steps:
      - name: Evaluate gate results
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          FAILED=0

          # `changes` must succeed. If it fails, downstream jobs skip and
          # would otherwise silently be treated as passed — defeating the
          # gate. So fail the gate explicitly on changes != success.
          CHANGES_RESULT="${{ needs.changes.result }}"
          if [ "$CHANGES_RESULT" = "success" ]; then
            echo "| changes | Passed (${{ needs.changes.outputs.code == 'true' && 'code' || 'docs-only' }}) |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| changes | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
            FAILED=1
          fi

          for CHECK in lint build test smoke; do
            RESULT=""
            case "$CHECK" in
              lint)  RESULT="${{ needs.lint.result }}" ;;
              build) RESULT="${{ needs.build.result }}" ;;
              test)  RESULT="${{ needs.test.result }}" ;;
              smoke) RESULT="${{ needs.smoke.result }}" ;;
            esac

            if [ "$RESULT" = "success" ] || [ "$RESULT" = "skipped" ]; then
              echo "| $CHECK | Passed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $CHECK | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "1" ]; then
            echo "::error::CI gate FAILED. One or more checks did not pass."
            echo "**CI: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "**CI: PASSED**" >> "$GITHUB_STEP_SUMMARY"
          fi
