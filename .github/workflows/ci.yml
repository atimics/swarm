name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/ticket-health.yml'
      - '.github/workflows/security-exceptions.yml'
      - '.github/workflows/gtm-kpi-report.yml'
      - '.github/workflows/leadership-scorecard.yml'
      - '.github/workflows/access-review.yml'
      - '.github/workflows/release-notes.yml'
      - 'issues/**'
      - 'scripts/ticket-health-report.sh'
      - 'scripts/leadership-scorecard.sh'
      - 'scripts/access-review.sh'
      - 'scripts/generate-gtm-kpi-report.mjs'
      - 'LICENSE'
      - '.editorconfig'

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run --if-present lint

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Validate security exceptions
        run: node scripts/validate-security-exceptions.mjs --ci

  smoke:
    name: Smoke Test (Admin UI)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (TypeScript + Admin UI)
        env:
          VITE_API_URL: /api
          VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID }}
        run: pnpm build

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Admin UI smoke test
        run: node scripts/smoke-admin-ui.mjs

  # Unified gate: configure this as the single required status check.
  #
  # Safety net: lint catches code quality issues, smoke test catches UI
  # regressions that would otherwise only be caught by pre-push hooks
  # (which can be bypassed with SKIP_PREPUSH=1).
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - smoke
    steps:
      - name: Evaluate gate results
        run: |
          echo "## CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          FAILED=0

          LINT_RESULT="${{ needs.lint.result }}"
          if [ "$LINT_RESULT" = "success" ] || [ "$LINT_RESULT" = "skipped" ]; then
            echo "| Lint | Passed |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Lint | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
            FAILED=1
          fi

          SMOKE_RESULT="${{ needs.smoke.result }}"
          if [ "$SMOKE_RESULT" = "success" ] || [ "$SMOKE_RESULT" = "skipped" ]; then
            echo "| Smoke Test | Passed |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Smoke Test | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
            FAILED=1
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" = "1" ]; then
            echo "::error::CI gate FAILED. One or more checks did not pass."
            echo "**CI: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "**CI: PASSED**" >> "$GITHUB_STEP_SUMMARY"
          fi
