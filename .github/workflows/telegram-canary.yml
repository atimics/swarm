name: Staging Canary

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: staging-canary
  cancel-in-progress: true

env:
  STAGING_API_URL: https://staging-swarm.rati.chat

jobs:
  canary:
    name: Staging Smoke Test
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Health check — /v1/models
        id: health
        run: |
          set -euo pipefail

          HTTP_CODE=$(curl -sS -o /tmp/models-response.json -w "%{http_code}" \
            --max-time 15 \
            -H "Authorization: Bearer ${{ secrets.CANARY_API_KEY }}" \
            "${STAGING_API_URL}/api/v1/models" || echo "000")

          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "Models endpoint returned HTTP ${HTTP_CODE}"
            cat /tmp/models-response.json | head -c 500
          else
            echo "::error::Models endpoint returned HTTP ${HTTP_CODE}"
            cat /tmp/models-response.json 2>/dev/null || true
            exit 1
          fi

      - name: Chat completions canary
        id: chat
        run: |
          set -euo pipefail

          CANARY_MSG="canary-smoke-test-$(date -u +%Y%m%dT%H%M%SZ)-${GITHUB_RUN_ID}"

          HTTP_CODE=$(curl -sS -o /tmp/chat-response.json -w "%{http_code}" \
            --max-time 60 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CANARY_API_KEY }}" \
            -d "{
              \"model\": \"agent-1-kt7l\",
              \"messages\": [
                {\"role\": \"user\", \"content\": \"${CANARY_MSG}\"}
              ],
              \"max_tokens\": 50
            }" \
            "${STAGING_API_URL}/api/v1/chat/completions" || echo "000")

          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Chat completions returned HTTP ${HTTP_CODE}"
            cat /tmp/chat-response.json 2>/dev/null || true
            exit 1
          fi

          echo "Chat completions returned HTTP ${HTTP_CODE}"

          # Validate response structure
          CONTENT=$(jq -r '.choices[0].message.content // empty' /tmp/chat-response.json 2>/dev/null || true)

          if [ -z "$CONTENT" ]; then
            echo "::error::Response missing choices[0].message.content"
            echo "Raw response:"
            cat /tmp/chat-response.json | head -c 1000
            exit 1
          fi

          echo "Response content (first 200 chars): ${CONTENT:0:200}"

      - name: Write summary
        if: always()
        run: |
          echo "## Staging Canary Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          HEALTH="${{ steps.health.outcome }}"
          CHAT="${{ steps.chat.outcome }}"

          if [ "$HEALTH" = "success" ]; then
            echo "| Health (/v1/models) | Passed |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Health (/v1/models) | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$CHAT" = "success" ]; then
            echo "| Chat completions | Passed |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Chat completions | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify failure via Telegram
        if: failure()
        run: |
          set -euo pipefail

          # Only alert if the previous run also failed (2+ consecutive failures).
          # Check the last workflow run status via GitHub API.
          PREV_CONCLUSION=$(curl -sS \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/telegram-canary.yml/runs?per_page=2&status=completed" \
            | jq -r '.workflow_runs[0].conclusion // "unknown"' 2>/dev/null || echo "unknown")

          echo "Previous run conclusion: ${PREV_CONCLUSION}"

          if [ "$PREV_CONCLUSION" != "failure" ]; then
            echo "First failure — suppressing alert (will alert on 2+ consecutive failures)"
            exit 0
          fi

          echo "::warning::Two consecutive canary failures detected — sending alert"

          if [ -n "${{ secrets.CANARY_TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.CANARY_TELEGRAM_CHAT_ID }}" ]; then
            curl -sS -X POST \
              "https://api.telegram.org/bot${{ secrets.CANARY_TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.CANARY_TELEGRAM_CHAT_ID }}" \
              -d parse_mode="Markdown" \
              -d text="*Staging Canary FAILED* (2+ consecutive)

          Run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          Health: \`${{ steps.health.outcome }}\`
          Chat: \`${{ steps.chat.outcome }}\`" \
              || echo "::warning::Failed to send Telegram alert"
          else
            echo "::warning::Telegram alert secrets not configured — skipping notification"
          fi
