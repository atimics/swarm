name: Privileged Access Review

on:
  schedule:
    # First day of each quarter at 09:00 UTC
    # Jan 1, Apr 1, Jul 1, Oct 1
    - cron: '0 9 1 1,4,7,10 *'

  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  access-review:
    name: Collect Access Inventory
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
        continue-on-error: true

      - name: Generate markdown report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OUTPUT=$(bash scripts/access-review.sh 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Store for issue body
          {
            echo "markdown<<REPORT_EOF"
            echo "$OUTPUT"
            echo "REPORT_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Generate JSON evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p evidence-artifacts
          bash scripts/access-review.sh --output-dir evidence-artifacts

      - name: Upload evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: access-review-${{ github.run_id }}
          path: evidence-artifacts/
          retention-days: 400

      - name: Check for findings
        id: findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FINDINGS_COUNT=$(bash scripts/access-review.sh --json | jq '.findings_count')
          echo "count=$FINDINGS_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create or update review issue
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        env:
          REPORT: ${{ steps.report.outputs.markdown }}
          FINDINGS_COUNT: ${{ steps.findings.outputs.count }}
        with:
          script: |
            const quarter = (() => {
              const d = new Date();
              return `Q${Math.floor(d.getMonth() / 3) + 1} ${d.getFullYear()}`;
            })();

            const title = `chore(governance): ${quarter} privileged access review`;
            const label = 'type:security';

            // Check for existing open issue with the same title
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });

            const duplicate = existing.data.find(i => i.title === title);

            const body = [
              `## ${quarter} Privileged Access Review`,
              '',
              'This issue was auto-generated by the quarterly access review workflow.',
              'Review the evidence packet attached to the workflow run and record decisions below.',
              '',
              `**Workflow Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `**Findings:** ${process.env.FINDINGS_COUNT}`,
              '',
              '<details>',
              '<summary>Full Report</summary>',
              '',
              process.env.REPORT,
              '',
              '</details>',
              '',
              '## Review Checklist',
              '',
              '- [ ] All GitHub admin users verified (expected: 1-2)',
              '- [ ] All write-access users have active need',
              '- [ ] Deploy keys reviewed; unused keys removed',
              '- [ ] Environment protection rules verified',
              '- [ ] Admin emails in CDK context are current',
              '- [ ] Admin wallets in CDK context are current',
              '- [ ] AWS IAM roles scoped correctly',
              '- [ ] OIDC trust policy scoped to cenetex/aws-swarm',
              '- [ ] All findings addressed or exceptions documented',
              '',
              '## Decisions',
              '',
              'Record each decision below:',
              '',
              '| Principal | Type | Decision | Reviewer | Date |',
              '|-----------|------|----------|----------|------|',
              '| *(fill in from report)* | | Retain / Modify / Revoke | | |',
              '',
              '## Sign-off',
              '',
              '- [ ] Reviewer: ________ Date: ________',
              '- [ ] Evidence artifact retained (auto-uploaded, 400-day retention)',
            ].join('\n');

            if (duplicate) {
              console.log(`Issue #${duplicate.number} already exists — adding comment with latest report.`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `## Updated Access Review Report — ${new Date().toISOString().slice(0, 10)}\n\n${process.env.REPORT}`,
              });
              return;
            }

            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: [label, 'type:infra', 'priority:medium'],
              body,
            });

            console.log(`Created issue #${issue.data.number}`);

      - name: Create follow-up issues for findings
        if: steps.findings.outputs.count != '0'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { execSync } = require('child_process');
            const json = execSync('bash scripts/access-review.sh --json', {
              env: { ...process.env }
            }).toString();
            const report = JSON.parse(json);

            for (const finding of report.findings) {
              const title = `[Access Review] ${finding.finding}`;

              // Check for duplicate
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'type:security',
              });

              if (existing.data.find(i => i.title === title)) {
                console.log(`Issue already exists: ${title}`);
                continue;
              }

              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['type:security', `priority:${finding.severity}`],
                body: [
                  `## Access Review Finding`,
                  '',
                  `**Severity:** ${finding.severity}`,
                  `**Detail:** ${finding.detail}`,
                  '',
                  `### Action Required`,
                  '',
                  finding.action,
                  '',
                  `*Auto-created by the privileged access review workflow (run ${context.runId}).*`,
                ].join('\n'),
              });

              console.log(`Created finding issue #${issue.data.number}: ${title}`);
            }
