name: Sync Runtime Issues

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to source internal issues from
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      dry_run:
        description: Dry run (report only, no GitHub issue writes)
        required: true
        default: true
        type: boolean
      limit:
        description: Max internal issues to process
        required: false
        default: '100'
        type: string

permissions:
  contents: read
  issues: write
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  sync:
    name: Sync internal issues
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
    env:
      INTERNAL_ISSUE_SYNC_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
      INTERNAL_ISSUE_FALLBACK_TO_FILES: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select role ARN for environment
        id: role
        env:
          REPORTING_ROLE: ${{ secrets.AWS_REPORTING_ROLE_ARN }}
          DEPLOY_ROLE: ${{ secrets.AWS_ROLE_ARN }}
          EXPECTED_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
        run: |
          set -euo pipefail

          # Extract the 12-digit account ID embedded in an IAM role ARN.
          extract_account() {
            echo "$1" | grep -oE 'arn:aws:iam::[0-9]{12}:' | grep -oE '[0-9]{12}' || true
          }

          REPORTING_ACCOUNT=$(extract_account "${REPORTING_ROLE:-}")
          DEPLOY_ACCOUNT=$(extract_account "${DEPLOY_ROLE:-}")

          echo "Target environment: ${TARGET_ENV}"
          echo "Expected account:   ${EXPECTED_ACCOUNT:-<not set>}"
          echo "Reporting role account: ${REPORTING_ACCOUNT:-<not set>}"
          echo "Deploy role account:    ${DEPLOY_ACCOUNT:-<not set>}"

          if [ -z "$EXPECTED_ACCOUNT" ]; then
            echo "::error::Missing required environment secret AWS_ACCOUNT_ID for '${TARGET_ENV}'"
            exit 1
          fi

          # Prefer the dedicated reporting role, but only if its account matches
          # the expected account for this environment. This prevents a
          # cross-account mismatch when a reporting role ARN from another
          # environment leaks into the current one (e.g. prod role used in staging).
          SELECTED_ROLE=""
          if [ -n "$REPORTING_ACCOUNT" ] && [ "$REPORTING_ACCOUNT" = "$EXPECTED_ACCOUNT" ]; then
            SELECTED_ROLE="$REPORTING_ROLE"
            echo "Using AWS_REPORTING_ROLE_ARN (account ${REPORTING_ACCOUNT} matches ${TARGET_ENV})"
          elif [ -n "${REPORTING_ROLE:-}" ] && [ "$REPORTING_ACCOUNT" != "$EXPECTED_ACCOUNT" ]; then
            echo "::warning::AWS_REPORTING_ROLE_ARN targets account ${REPORTING_ACCOUNT} but ${TARGET_ENV} expects ${EXPECTED_ACCOUNT}. Falling back to AWS_ROLE_ARN."
          fi

          if [ -z "$SELECTED_ROLE" ]; then
            if [ -z "${DEPLOY_ROLE:-}" ]; then
              echo "::error::Neither AWS_REPORTING_ROLE_ARN nor AWS_ROLE_ARN is configured for '${TARGET_ENV}'"
              exit 1
            fi
            if [ -n "$DEPLOY_ACCOUNT" ] && [ "$DEPLOY_ACCOUNT" != "$EXPECTED_ACCOUNT" ]; then
              echo "::error::AWS_ROLE_ARN targets account ${DEPLOY_ACCOUNT} but ${TARGET_ENV} expects ${EXPECTED_ACCOUNT}. Check GitHub environment secrets."
              exit 1
            fi
            SELECTED_ROLE="$DEPLOY_ROLE"
            echo "Using AWS_ROLE_ARN (fallback)"
          fi

          echo "role_arn=${SELECTED_ROLE}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ steps.role.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: internal-issues-sync

      - name: Verify AWS account for environment
        env:
          TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID} (environment: ${TARGET_ENV})"

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for ${TARGET_ENV} (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID}). Check that AWS_REPORTING_ROLE_ARN and AWS_ROLE_ARN in the '${TARGET_ENV}' GitHub environment point to the correct account."
            exit 1
          fi

      - name: Resolve admin API URL and internal key
        env:
          TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
        run: |
          set -euo pipefail

          CDK_ENV="$TARGET_ENV"
          if [ "$CDK_ENV" = "production" ]; then
            CDK_ENV="prod"
          fi

          STACK_NAME="SwarmApi-${CDK_ENV}"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?contains(ExportName, 'swarm-admin-api-url-${CDK_ENV}')].OutputValue | [0]" \
            --output text)

          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::error::Could not resolve admin API URL for $STACK_NAME"
            exit 1
          fi

          FUNCTION_NAME=$(aws cloudformation describe-stack-resources \
            --stack-name "$STACK_NAME" \
            --query "StackResources[?ResourceType=='AWS::Lambda::Function' && contains(LogicalResourceId, 'ChatHandler')].PhysicalResourceId | [0]" \
            --output text)

          INTERNAL_TEST_KEY=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query "Environment.Variables.INTERNAL_TEST_KEY" \
            --output text)

          if [ -z "$INTERNAL_TEST_KEY" ] || [ "$INTERNAL_TEST_KEY" = "None" ]; then
            echo "::error::Could not resolve INTERNAL_TEST_KEY for $FUNCTION_NAME"
            exit 1
          fi

          echo "SWARM_ADMIN_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "SWARM_INTERNAL_TEST_KEY=$INTERNAL_TEST_KEY" >> "$GITHUB_ENV"

      - name: Print sync mode
        run: |
          if [ "${INTERNAL_ISSUE_SYNC_DRY_RUN}" = "true" ]; then
            echo "Runtime issue sync mode: DRY RUN (report only)"
          else
            echo "Runtime issue sync mode: APPLY (writes GitHub issues)"
          fi

          if [ "${INTERNAL_ISSUE_FALLBACK_TO_FILES}" = "true" ]; then
            echo "Fallback source: ENABLED (local files allowed)"
          else
            echo "Fallback source: DISABLED (API only)"
          fi

      - name: Enforce apply mode for scheduled runs
        if: github.event_name == 'schedule'
        run: |
          if [ "${INTERNAL_ISSUE_SYNC_DRY_RUN}" != "false" ]; then
            echo "::error::Scheduled runtime sync must run in apply mode."
            exit 1
          fi

          if [ "${INTERNAL_ISSUE_FALLBACK_TO_FILES}" != "false" ]; then
            echo "::error::Scheduled runtime sync must disable file fallback."
            exit 1
          fi

      - name: Run internal issue sync
        env:
          ISSUES_REPO: ${{ github.repository }}
          INTERNAL_ISSUE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '100' }}
        run: |
          MODE_FLAG="--apply"
          if [ "${INTERNAL_ISSUE_SYNC_DRY_RUN}" = "true" ]; then
            MODE_FLAG="--dry-run"
          fi
          node scripts/sync-internal-issues-to-github.mjs --config .github/policy/internal-issue-sync-policy.json "$MODE_FLAG"

      - name: Upload sync summaries
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: internal-issues-sync-summary
          path: test-outputs/internal-issues-sync/*.json
          if-no-files-found: ignore
