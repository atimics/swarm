name: Deploy

run-name: >-
  Deploy ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (startsWith(github.ref, 'refs/tags/') && 'Production' || 'Staging') }}

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - 'issues/**'
    tags: ['v*']

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      stack:
        description: 'Stack to deploy (leave empty for all)'
        required: false
        type: string
      use_existing_resources:
        description: 'Import existing shared resources (DynamoDB, S3, ECS) instead of creating new ones'
        required: false
        default: true
        type: boolean
      use_existing_buckets:
        description: 'Import existing S3 buckets instead of creating new ones (for redeploying after stack deletion with RETAIN)'
        required: false
        default: false
        type: boolean
      skip_domain_aliases:
        description: 'Deploy CloudFront without domain aliases (use when CNAME is locked by orphaned distribution)'
        required: false
        default: false
        type: boolean
      stack_hash:
        description: 'Six-digit hash suffix for parallel stacks'
        required: false
        type: string
      run_browser_tests:
        description: 'Run Browser Visual Tests (expensive)'
        required: false
        default: false
        type: boolean
      use_hotswap:
        description: 'Use CDK hotswap fallback (faster, less prod-like)'
        required: false
        default: false
        type: boolean
      run_prod_smoke:
        description: 'Run lightweight production smoke checks after deploy'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      cdk_env: ${{ steps.env.outputs.cdk_env }}
      api_url: ${{ steps.env.outputs.api_url }}
      admin_url: ${{ steps.env.outputs.admin_url }}
      use_existing_resources: ${{ steps.env.outputs.use_existing_resources }}
      use_existing_buckets: ${{ steps.env.outputs.use_existing_buckets }}
      skip_domain_aliases: ${{ steps.env.outputs.skip_domain_aliases }}
      stack_hash: ${{ steps.env.outputs.stack_hash }}
      stack: ${{ steps.env.outputs.stack }}
      use_hotswap: ${{ steps.env.outputs.use_hotswap }}
      run_browser_tests: ${{ steps.env.outputs.run_browser_tests }}
      run_prod_smoke: ${{ steps.env.outputs.run_prod_smoke }}

    steps:
      - name: Checkout (for tag detection)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set environment and resolved options
        id: env
        env:
          INPUT_USE_EXISTING_RESOURCES: ${{ inputs.use_existing_resources }}
          INPUT_USE_EXISTING_BUCKETS: ${{ inputs.use_existing_buckets }}
          INPUT_SKIP_DOMAIN_ALIASES: ${{ inputs.skip_domain_aliases }}
          INPUT_STACK_HASH: ${{ inputs.stack_hash }}
          INPUT_STACK: ${{ inputs.stack }}
          INPUT_USE_HOTSWAP: ${{ inputs.use_hotswap }}
          INPUT_RUN_BROWSER_TESTS: ${{ inputs.run_browser_tests }}
          INPUT_RUN_PROD_SMOKE: ${{ inputs.run_prod_smoke }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          else
            REF="${{ github.ref }}"
            BRANCH="${REF#refs/heads/}"

            if [ "$BRANCH" = "main" ]; then
              ENV="staging"
            elif [[ "$REF" == refs/tags/v* ]]; then
              ENV="production"
            else
              echo "::error::Unsupported ref for deployment (ref='$REF')"
              exit 1
            fi
          fi

          CDK_ENV="${ENV/production/prod}"

          if [ "$CDK_ENV" = "staging" ]; then
            ADMIN_HOST="staging-swarm.rati.chat"
          else
            ADMIN_HOST="swarm.rati.chat"
          fi

          API_URL="https://${ADMIN_HOST}/api"
          ADMIN_URL="https://${ADMIN_HOST}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            USE_EXISTING_RESOURCES="${INPUT_USE_EXISTING_RESOURCES:-true}"
            USE_EXISTING_BUCKETS="${INPUT_USE_EXISTING_BUCKETS:-false}"
            SKIP_DOMAIN_ALIASES="${INPUT_SKIP_DOMAIN_ALIASES:-false}"
            STACK_HASH="${INPUT_STACK_HASH:-}"
            STACK="${INPUT_STACK:-}"
            USE_HOTSWAP="${INPUT_USE_HOTSWAP:-false}"
            RUN_BROWSER_TESTS="${INPUT_RUN_BROWSER_TESTS:-false}"
            RUN_PROD_SMOKE="${INPUT_RUN_PROD_SMOKE:-false}"

            # Production S3 buckets have DeletionPolicy: Retain, so they
            # persist across stack deletions.  Auto-enable useExistingBuckets
            # for production dispatches to prevent "bucket already exists"
            # failures.  Operators can still override via the checkbox.
            if [ "$ENV" = "production" ] && [ "$USE_EXISTING_BUCKETS" = "false" ]; then
              USE_EXISTING_BUCKETS="true"
              echo "::notice::Auto-enabled useExistingBuckets for production (S3 buckets have RETAIN policy)"
            fi
          else
            # For push/tag triggers, set safe defaults per environment.
            # Both staging and production use useExistingResources=true (set in
            # cdk.context.json). The -c flag matches the committed context.
            USE_EXISTING_RESOURCES="true"
            if [ "$ENV" = "production" ]; then
              USE_EXISTING_BUCKETS="true"
              SKIP_DOMAIN_ALIASES="false"
              RUN_PROD_SMOKE="true"
              USE_HOTSWAP="false"
            else
              USE_EXISTING_BUCKETS="false"
              SKIP_DOMAIN_ALIASES="false"
              RUN_PROD_SMOKE="false"
              USE_HOTSWAP="true"
            fi
            STACK_HASH=""
            STACK=""
            RUN_BROWSER_TESTS="false"
          fi

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "cdk_env=$CDK_ENV" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "admin_url=$ADMIN_URL" >> "$GITHUB_OUTPUT"
          echo "use_existing_resources=$USE_EXISTING_RESOURCES" >> "$GITHUB_OUTPUT"
          echo "use_existing_buckets=$USE_EXISTING_BUCKETS" >> "$GITHUB_OUTPUT"
          echo "skip_domain_aliases=$SKIP_DOMAIN_ALIASES" >> "$GITHUB_OUTPUT"
          echo "stack_hash=$STACK_HASH" >> "$GITHUB_OUTPUT"
          echo "stack=$STACK" >> "$GITHUB_OUTPUT"
          echo "use_hotswap=$USE_HOTSWAP" >> "$GITHUB_OUTPUT"
          echo "run_browser_tests=$RUN_BROWSER_TESTS" >> "$GITHUB_OUTPUT"
          echo "run_prod_smoke=$RUN_PROD_SMOKE" >> "$GITHUB_OUTPUT"
          echo "🚀 Deploying to **$ENV**" >> "$GITHUB_STEP_SUMMARY"

  cdk-deploy:
    name: CDK Deploy (${{ needs.setup.outputs.environment }})
    needs: setup
    uses: ./.github/workflows/deploy-cdk-reusable.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      cdk_env: ${{ needs.setup.outputs.cdk_env }}
      admin_url: ${{ needs.setup.outputs.admin_url }}
      use_existing_resources: ${{ needs.setup.outputs.use_existing_resources == 'true' }}
      use_existing_buckets: ${{ needs.setup.outputs.use_existing_buckets == 'true' }}
      skip_domain_aliases: ${{ needs.setup.outputs.skip_domain_aliases == 'true' }}
      stack_hash: ${{ needs.setup.outputs.stack_hash }}
      stack: ${{ needs.setup.outputs.stack }}
      use_hotswap: ${{ needs.setup.outputs.use_hotswap == 'true' }}
    secrets: inherit

  admin-ui-build:
    name: Build Admin UI
    needs: setup
    runs-on: ubuntu-latest
    environment: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Admin UI
        env:
          VITE_API_URL: /api
          VITE_CROSSMINT_PROJECT_ID: ${{ secrets.VITE_CROSSMINT_PROJECT_ID }}
          VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID }}
        run: pnpm --filter @swarm/admin-ui build

      - name: Upload build artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: admin-ui-dist
          path: packages/admin-ui/dist
          if-no-files-found: error
          retention-days: 1

  admin-ui-deploy:
    name: Deploy Admin UI (${{ needs.setup.outputs.environment }})
    needs: [setup, cdk-deploy, admin-ui-build]
    if: >-
      always() &&
      needs.admin-ui-build.result == 'success' &&
      (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped')
    uses: ./.github/workflows/deploy-admin-ui-reusable.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      cdk_env: ${{ needs.setup.outputs.cdk_env }}
      admin_url: ${{ needs.setup.outputs.admin_url }}
      api_url: ${{ needs.setup.outputs.api_url }}
      stack_hash: ${{ needs.setup.outputs.stack_hash }}
      cdk_distribution: ${{ needs.cdk-deploy.outputs.distribution }}
      skip_build: true
    secrets: inherit

  e2e:
    name: E2E (Staging)
    runs-on: ubuntu-latest
    needs: [setup, admin-ui-deploy]
    environment: ${{ needs.setup.outputs.environment }}
    if: needs.setup.outputs.environment == 'staging'
    env:
      AWS_REGION: us-east-1
      E2E_TELEGRAM_AVATAR_ID: ${{ secrets.E2E_TELEGRAM_AVATAR_ID }}
      E2E_WEB_AVATAR_ID: ${{ secrets.E2E_WEB_AVATAR_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: e2e-staging

      - name: Verify AWS account for environment
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID}"

          if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Missing required environment secret AWS_ACCOUNT_ID for staging"
            exit 1
          fi

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for staging (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID})"
            exit 1
          fi

      - name: Validate E2E inputs
        run: |
          if [ -z "$E2E_TELEGRAM_AVATAR_ID" ] || [ -z "$E2E_WEB_AVATAR_ID" ]; then
            echo "::error::Missing E2E avatar IDs (E2E_TELEGRAM_AVATAR_ID, E2E_WEB_AVATAR_ID)"
            exit 1
          fi

      - name: Run Telegram E2E
        run: ./scripts/test-e2e.sh telegram "$E2E_TELEGRAM_AVATAR_ID" "ci-telegram-${GITHUB_RUN_ID}" staging

      - name: Run Web E2E
        run: ./scripts/test-e2e.sh web "$E2E_WEB_AVATAR_ID" "ci-web-${GITHUB_RUN_ID}" staging

  prod-smoke:
    name: Smoke (Production)
    runs-on: ubuntu-latest
    needs: [setup, admin-ui-deploy]
    environment: ${{ needs.setup.outputs.environment }}
    if: >-
      needs.setup.outputs.environment == 'production' &&
      (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_prod_smoke == true))
    steps:
      - name: Smoke check UI + API endpoints
        env:
          ADMIN_URL: ${{ needs.setup.outputs.admin_url }}
          API_URL: ${{ needs.setup.outputs.api_url }}
        run: |
          set -euo pipefail

          check_url() {
            local url="$1"
            local name="$2"

            local code
            code=$(curl -sS -L -o /dev/null -w "%{http_code}" --max-time 20 "$url" || echo "000")

            case "$code" in
              200|301|302|401|403)
                echo "✅ $name: $code ($url)" >> "$GITHUB_STEP_SUMMARY"
                ;;
              *)
                echo "::error::$name returned unexpected HTTP $code ($url)"
                echo "❌ $name: $code ($url)" >> "$GITHUB_STEP_SUMMARY"
                exit 1
                ;;
            esac
          }

          echo "## Production Smoke Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- UI: $ADMIN_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- API: $API_URL" >> "$GITHUB_STEP_SUMMARY"

          check_url "$ADMIN_URL" "Admin UI"
          check_url "$API_URL" "Admin API (/api)"

  browser:
    name: Browser Visual Tests
    runs-on: ubuntu-latest
    needs: [setup, admin-ui-deploy, e2e]
    environment: ${{ needs.setup.outputs.environment }}
    if: |
      needs.setup.outputs.environment == 'staging' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.run_browser_tests == true
    env:
      AWS_REGION: us-east-1
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      TEST_WALLET_PRIVATE_KEY: ${{ secrets.TEST_WALLET_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: browser-staging

      - name: Verify AWS account for environment
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID}"

          if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Missing required environment secret AWS_ACCOUNT_ID for staging"
            exit 1
          fi

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for staging (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID})"
            exit 1
          fi

      - name: Run Browser Tests
        run: node scripts/test-browser.mjs staging

      - name: Browser Test Summary
        if: always()
        run: |
          echo "## Browser Visual Tests" >> $GITHUB_STEP_SUMMARY
          echo "- **UI:** ${{ needs.setup.outputs.admin_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** ${{ needs.setup.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY

          RUN_DIR=$(ls -td test-screenshots/run-* 2>/dev/null | head -n 1 || true)
          if [ -z "$RUN_DIR" ]; then
            echo "- No run directory found under test-screenshots/" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "- **Run:** \`$(basename "$RUN_DIR")\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** browser-screenshots" >> $GITHUB_STEP_SUMMARY

          if [ -f "$RUN_DIR/history.json" ]; then
            RESULT=$(node -e "const h=require('./' + process.argv[1] + '/history.json'); console.log(h.success ? '✅ SUCCESS' : (h.aborted ? '🛑 ABORTED' : '❌ FAILED'));" "$RUN_DIR")
            STEPS=$(node -e "const h=require('./' + process.argv[1] + '/history.json'); console.log(h.steps ?? '');" "$RUN_DIR")
            SUMMARY=$(node -e "const h=require('./' + process.argv[1] + '/history.json'); console.log(h.summary ?? '');" "$RUN_DIR")
            echo "- **Result:** $RESULT" >> $GITHUB_STEP_SUMMARY
            echo "- **Steps:** $STEPS" >> $GITHUB_STEP_SUMMARY
            if [ -n "$SUMMARY" ]; then
              echo "- **Summary:** $SUMMARY" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- history.json not found (test may have crashed early)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$RUN_DIR/report.md" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$RUN_DIR/report.md" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "- report.md not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: browser-screenshots
          path: test-screenshots/
          retention-days: 7

  tag-production-deploy:
    name: Tag Production Deploy
    runs-on: ubuntu-latest
    needs: [setup, cdk-deploy, admin-ui-deploy]
    if: >-
      needs.setup.outputs.environment == 'production' &&
      needs.cdk-deploy.result == 'success' &&
      needs.admin-ui-deploy.result == 'success'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Create and push deploy tag
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SHA_SHORT=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TS=$(date -u +%Y%m%d-%H%M%S)
          TAG="deploy-prod-${TS}-${SHA_SHORT}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${TAG}"
          else
            git tag -a "${TAG}" -m "Production deploy ${TS} (run ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            git push origin "${TAG}"
            echo "✅ Pushed production deploy tag: ${TAG}" >> "$GITHUB_STEP_SUMMARY"
          fi
