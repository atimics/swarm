name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production
      stack:
        description: 'Stack to deploy (leave empty for all)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  # Build job runs in parallel with early AWS setup
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Cache Lambda Layer
        id: cache-layer
        uses: actions/cache@v4
        with:
          path: packages/layer/nodejs
          key: lambda-layer-${{ hashFiles('packages/layer/package.json') }}

      - name: Build Lambda Layer
        if: steps.cache-layer.outputs.cache-hit != 'true'
        run: |
          cd packages/layer
          mkdir -p nodejs
          cp package.json nodejs/
          cd nodejs
          npm install --omit=dev --legacy-peer-deps
          cd ..

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: |
            packages/*/dist
            packages/layer/nodejs
          retention-days: 1

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment || 'production' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: packages

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy

      - name: CDK Deploy
        working-directory: packages/infra
        run: |
          ENV_NAME="${{ inputs.environment || 'production' }}"
          # Map GitHub environment names to CDK environment names
          if [ "$ENV_NAME" = "production" ]; then
            CDK_ENV="prod"
          else
            CDK_ENV="$ENV_NAME"
          fi
          
          if [ -n "${{ inputs.stack }}" ]; then
            npx cdk deploy ${{ inputs.stack }} --require-approval never -c environment=$CDK_ENV
          else
            npx cdk deploy --all --require-approval never -c environment=$CDK_ENV
          fi

      - name: Get Stack Outputs
        id: stack-outputs
        working-directory: packages/infra
        run: |
          ENV_NAME="${{ inputs.environment || 'production' }}"
          if [ "$ENV_NAME" = "production" ]; then
            CDK_ENV="prod"
          else
            CDK_ENV="$ENV_NAME"
          fi
          
          # Get Admin UI bucket and distribution from CloudFormation
          STACK_NAME="SwarmStack-$CDK_ENV"
          
          ADMIN_BUCKET=$(aws cloudformation describe-stacks --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-bucket-$CDK_ENV'].OutputValue" \
            --output text)
          
          ADMIN_DISTRIBUTION=$(aws cloudformation describe-stacks --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-distribution-$CDK_ENV'].OutputValue" \
            --output text)
          
          ADMIN_URL=$(aws cloudformation describe-stacks --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-url-$CDK_ENV'].OutputValue" \
            --output text)
          
          # Get Admin API endpoint if it exists
          ADMIN_API_URL=$(aws cloudformation describe-stacks --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?contains(OutputKey, 'ApiEndpoint')].OutputValue" \
            --output text 2>/dev/null || echo "")
          
          echo "bucket=$ADMIN_BUCKET" >> $GITHUB_OUTPUT
          echo "distribution=$ADMIN_DISTRIBUTION" >> $GITHUB_OUTPUT
          echo "url=$ADMIN_URL" >> $GITHUB_OUTPUT
          echo "api_url=$ADMIN_API_URL" >> $GITHUB_OUTPUT
          
          echo "## Deployed Stacks ($ENV_NAME)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Stack: \`$STACK_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "Admin UI Bucket: \`$ADMIN_BUCKET\`" >> $GITHUB_STEP_SUMMARY
          echo "Admin UI URL: $ADMIN_URL" >> $GITHUB_STEP_SUMMARY
          echo "Admin API URL: $ADMIN_API_URL" >> $GITHUB_STEP_SUMMARY

    outputs:
      admin-bucket: ${{ steps.stack-outputs.outputs.bucket }}
      admin-distribution: ${{ steps.stack-outputs.outputs.distribution }}
      admin-url: ${{ steps.stack-outputs.outputs.url }}
      admin-api-url: ${{ steps.stack-outputs.outputs.api_url }}

  deploy-admin-ui:
    name: Deploy Admin UI
    runs-on: ubuntu-latest
    needs: [build, deploy]
    environment: ${{ inputs.environment || 'production' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: packages

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild Admin UI with API URL
        working-directory: packages/admin-ui
        run: pnpm build
        env:
          # Use the direct API Gateway URL (custom domain requires ACM cert setup)
          VITE_API_URL: ${{ needs.deploy.outputs.admin-api-url }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-ui

      - name: Deploy to S3
        run: |
          aws s3 sync packages/admin-ui/dist s3://${{ needs.deploy.outputs.admin-bucket }} \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.json"
          
          aws s3 cp packages/admin-ui/dist/index.html s3://${{ needs.deploy.outputs.admin-bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          DISTRIBUTION_ID="${{ needs.deploy.outputs.admin-distribution }}"
          if [ -n "$DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $DISTRIBUTION_ID \
              --paths "/*"
            echo "CloudFront cache invalidated for distribution: $DISTRIBUTION_ID"
          fi

      - name: Summary
        run: |
          echo "## Admin UI Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ needs.deploy.outputs.admin-url }}" >> $GITHUB_STEP_SUMMARY
