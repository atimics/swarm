name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      stack:
        description: 'Stack to deploy (leave empty for all)'
        required: false
        type: string

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.event.workflow_run.head_branch }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       (
         github.event.workflow_run.head_branch == 'main' ||
         startsWith(github.event.workflow_run.head_branch, 'v')
       ))
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (startsWith(github.event.workflow_run.head_branch, 'v') && 'production' || 'staging') }}
    
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      admin-url: ${{ steps.outputs.outputs.url }}
      api-url: ${{ steps.outputs.outputs.api_url }}

    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          else
            REF="${{ github.event.workflow_run.head_branch }}"
            if [ "$REF" = "main" ]; then
              ENV="staging"
            elif [[ "$REF" == v* ]]; then
              ENV="production"
            else
              echo "::error::Unsupported ref '$REF' for deployment"
              exit 1
            fi
          fi
          CDK_ENV="${ENV/production/prod}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "cdk_env=$CDK_ENV" >> $GITHUB_OUTPUT
          echo "🚀 Deploying to **$ENV**" >> $GITHUB_STEP_SUMMARY

      - uses: actions/checkout@v4

      - name: Download CI build artifacts
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache Lambda Layer
        id: layer-cache
        uses: actions/cache@v4
        with:
          path: packages/layer/nodejs
          key: layer-${{ hashFiles('packages/layer/package.json') }}

      - name: Cache CDK output
        uses: actions/cache@v4
        with:
          path: packages/infra/cdk.out
          key: cdk-${{ steps.env.outputs.cdk_env }}-${{ hashFiles('packages/infra/**/*.ts', 'packages/*/src/**/*.ts') }}
          restore-keys: cdk-${{ steps.env.outputs.cdk_env }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          # Build layer if not cached
          if [ "${{ steps.layer-cache.outputs.cache-hit }}" != "true" ]; then
            cd packages/layer && mkdir -p nodejs && cp package.json nodejs/ && cd nodejs && npm i --omit=dev --legacy-peer-deps && cd ../..
          fi
          # If CI artifacts were downloaded, reuse them; otherwise build
          if [ -d packages/core/dist ]; then
            echo "Using CI build artifacts"
          else
            pnpm -r --filter '!admin-ui' build
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-${{ steps.env.outputs.environment }}

      - name: CDK Deploy
        working-directory: packages/infra
        run: |
          HOTSWAP=${{ steps.env.outputs.cdk_env == 'staging' && '--hotswap-fallback' || '' }}
          STACK="${{ inputs.stack }}"
          npx cdk deploy ${STACK:-'--all'} --require-approval never --concurrency 10 $HOTSWAP -c environment=${{ steps.env.outputs.cdk_env }}

      - name: Get outputs
        id: outputs
        run: |
          STACK="SwarmStack-${{ steps.env.outputs.cdk_env }}"
          echo "bucket=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-bucket-${{ steps.env.outputs.cdk_env }}'].OutputValue" --output text)" >> $GITHUB_OUTPUT
          echo "distribution=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-distribution-${{ steps.env.outputs.cdk_env }}'].OutputValue" --output text)" >> $GITHUB_OUTPUT
          echo "url=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-url-${{ steps.env.outputs.cdk_env }}'].OutputValue" --output text)" >> $GITHUB_OUTPUT
          echo "api_url=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?contains(OutputKey, 'ApiEndpoint')].OutputValue" --output text 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Build & Deploy Admin UI
        run: |
          cd packages/admin-ui
          API_URL="${{ steps.outputs.outputs.api_url }}"
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::error::API URL output missing"
            exit 1
          fi
          VITE_API_URL=$API_URL pnpm build
          aws s3 sync dist s3://${{ steps.outputs.outputs.bucket }} --delete --cache-control "max-age=31536000,immutable" --exclude "index.html" --exclude "*.json"
          aws s3 cp dist/index.html s3://${{ steps.outputs.outputs.bucket }}/index.html --cache-control "no-cache"

      - name: Invalidate CDN
        run: |
          DIST="${{ steps.outputs.outputs.distribution }}"
          [ -n "$DIST" ] && [ "$DIST" != "None" ] && aws cloudfront create-invalidation --distribution-id $DIST --paths "/*" --no-cli-pager || true

      - name: Summary
        run: |
          echo "## ✅ Deployed to ${{ steps.env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **UI:** ${{ steps.outputs.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** ${{ steps.outputs.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
