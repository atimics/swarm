name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      stack:
        description: 'Stack to deploy (leave empty for all)'
        required: false
        type: string
      split_stacks:
        description: 'Use split stacks (parallel deployment)'
        required: false
        default: false
        type: boolean
      use_existing_shared_resources:
        description: 'Adopt existing shared resources (migration mode for split stacks)'
        required: false
        default: false
        type: boolean
      stack_hash:
        description: 'Six-digit hash suffix for parallel stacks'
        required: false
        type: string
      run_browser_tests:
        description: 'Run Browser Visual Tests (expensive)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  # Shared setup job to determine environment
  setup:
    name: Setup
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      cdk_env: ${{ steps.env.outputs.cdk_env }}
      api_url: ${{ steps.env.outputs.api_url }}
      admin_url: ${{ steps.env.outputs.admin_url }}

    steps:
      - name: Checkout (for tag detection)
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          else
            REF="${{ github.ref }}"
            BRANCH="${REF#refs/heads/}"

            if [ "$BRANCH" = "main" ]; then
              ENV="staging"
            elif [[ "$REF" == refs/tags/v* ]]; then
              ENV="production"
            else
              echo "::error::Unsupported ref for deployment (ref='$REF')"
              exit 1
            fi
          fi
          CDK_ENV="${ENV/production/prod}"
          
          # Pre-compute resource names (deterministic from CDK)
          # API is served via same-origin CloudFront proxy under /api/*
          if [ "$CDK_ENV" = "staging" ]; then
            ADMIN_HOST="staging-swarm.rati.chat"
          else
            ADMIN_HOST="swarm.rati.chat"
          fi

          API_URL="https://${ADMIN_HOST}/api"
          ADMIN_URL="https://${ADMIN_HOST}"
          
          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "cdk_env=$CDK_ENV" >> $GITHUB_OUTPUT
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "admin_url=$ADMIN_URL" >> $GITHUB_OUTPUT
          echo "🚀 Deploying to **$ENV**" >> $GITHUB_STEP_SUMMARY

  # CDK deployment (Lambda, API Gateway, DynamoDB, etc)
  cdk-deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}
    outputs:
      bucket: ${{ steps.outputs.outputs.bucket }}
      distribution: ${{ steps.outputs.outputs.distribution }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache Lambda Layer
        id: layer-cache
        uses: actions/cache@v4
        with:
          path: packages/layer/nodejs
          key: layer-${{ hashFiles('packages/layer/package.json', 'packages/layer/node-fetch-shim/**', 'packages/layer/abort-controller-shim/**') }}

      - name: Cache CDK output
        uses: actions/cache@v4
        with:
          path: packages/infra/cdk.out
          key: cdk-${{ needs.setup.outputs.cdk_env }}-${{ hashFiles('pnpm-lock.yaml', 'packages/infra/package.json', 'packages/infra/**/*.ts', 'packages/*/src/**/*.ts') }}
          restore-keys: cdk-${{ needs.setup.outputs.cdk_env }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          # Build layer if not cached (with Linux platform for Lambda)
          if [ "${{ steps.layer-cache.outputs.cache-hit }}" != "true" ]; then
            cd packages/layer && pnpm run build:layer && cd ../..
          fi
          pnpm -r --filter '!admin-ui' build

      - name: Validate AWS environment secrets
        run: |
          ROLE_ARN="${{ secrets.AWS_ROLE_ARN }}"
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"

          if [ -z "$ROLE_ARN" ]; then
            echo "::error::Missing required environment secret AWS_ROLE_ARN"
            exit 1
          fi

          if [ "${{ needs.setup.outputs.environment }}" = "production" ]; then
            if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
              echo "::error::Missing required environment secret AWS_ACCOUNT_ID for production"
              exit 1
            fi

            if [[ "$ROLE_ARN" != arn:aws:iam::${EXPECTED_AWS_ACCOUNT_ID}:role/* ]]; then
              echo "::error::AWS_ROLE_ARN does not match AWS_ACCOUNT_ID (role='$ROLE_ARN', expected account='${EXPECTED_AWS_ACCOUNT_ID}')"
              exit 1
            fi
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-cdk-${{ needs.setup.outputs.environment }}

      - name: Verify AWS account for environment
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID}"

          if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            if [ "${{ needs.setup.outputs.environment }}" = "production" ]; then
              echo "::error::Missing required environment secret AWS_ACCOUNT_ID for production"
              exit 1
            fi
            echo "::warning::AWS_ACCOUNT_ID secret not set; skipping account guard"
            exit 0
          fi

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for ${{ needs.setup.outputs.environment }} (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID})"
            exit 1
          fi

      - name: Download CDK context from S3
        working-directory: packages/infra
        env:
          CDK_CONTEXT_BUCKET: ${{ secrets.SWARM_CDK_CONTEXT_BUCKET }}
        run: |
          if [ -z "$CDK_CONTEXT_BUCKET" ]; then
            echo "Missing SWARM_CDK_CONTEXT_BUCKET GitHub secret (required for CDK deploy)." >&2
            exit 1
          fi

          ENV="${{ needs.setup.outputs.cdk_env }}"
          KEY="swarm/cdk-context/${ENV}/cdk.context.json"

          echo "Downloading s3://${CDK_CONTEXT_BUCKET}/${KEY} -> cdk.context.json"
          aws s3 cp "s3://${CDK_CONTEXT_BUCKET}/${KEY}" "cdk.context.json" --only-show-errors

      - name: Ensure CDK bootstrap
        working-directory: packages/infra
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          if aws ssm get-parameter --name "/cdk-bootstrap/hnb659fds/version" --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "✅ CDK bootstrap already present in ${ACCOUNT_ID}/${AWS_REGION}"
            exit 0
          fi

          echo "⚠️  CDK bootstrap missing in ${ACCOUNT_ID}/${AWS_REGION}; bootstrapping now"
          npx cdk bootstrap "aws://${ACCOUNT_ID}/${AWS_REGION}" --require-approval never

      - name: CDK Diff
        id: diff
        working-directory: packages/infra
        env:
          SPLIT_STACKS: ${{ inputs.split_stacks || 'false' }}
          USE_EXISTING_SHARED_RESOURCES: ${{ inputs.use_existing_shared_resources || 'false' }}
          STACK_HASH: ${{ inputs.stack_hash || '' }}
          ADMIN_CERTIFICATE_ARN: ${{ secrets.ADMIN_CERTIFICATE_ARN || '' }}
        run: |
          # Safety: when migrating staging to split stacks (no stack_hash), shared resources already exist.
          # Auto-enable adoption mode to avoid early validation failures.
          if [ "$SPLIT_STACKS" = "true" ] && [ "${{ needs.setup.outputs.cdk_env }}" = "staging" ] && [ -z "$STACK_HASH" ]; then
            USE_EXISTING_SHARED_RESOURCES="true"
          fi

          # Ensure we always use the correct admin domain + cert per environment.
          # This prevents cross-account ACM ARNs in shared cdk.context.json from breaking prod.
          ADMIN_DOMAIN=$(echo "${{ needs.setup.outputs.admin_url }}" | sed -E 's|^https?://||' | cut -d/ -f1)
          EXTRA_CONTEXT_ARGS="-c adminDomain=${ADMIN_DOMAIN}"

          if [ "${{ needs.setup.outputs.environment }}" = "production" ] && [ -z "$ADMIN_CERTIFICATE_ARN" ]; then
            echo "::error::Missing required environment secret ADMIN_CERTIFICATE_ARN for production"
            exit 1
          fi

          if [ -n "$ADMIN_CERTIFICATE_ARN" ]; then
            EXTRA_CONTEXT_ARGS="${EXTRA_CONTEXT_ARGS} -c adminCertificateArn=${ADMIN_CERTIFICATE_ARN}"
          fi

          STACK="${{ inputs.stack }}"
          echo "Checking for infrastructure changes..."
          set +e
          npx cdk diff ${STACK:-'--all'} -c environment=${{ needs.setup.outputs.cdk_env }} -c splitStacks=$SPLIT_STACKS -c useExistingSharedResources=$USE_EXISTING_SHARED_RESOURCES -c stackHash=$STACK_HASH ${EXTRA_CONTEXT_ARGS} 2>&1 | tee diff-output.txt
          DIFF_EXIT=$?
          set -e
          
          # Check if there are no differences (exit 0 and contains "no differences")
          if [ $DIFF_EXIT -eq 0 ] && grep -q "There were no differences" diff-output.txt; then
            # Don't skip deploy if the target stack does not exist (common after manual cleanup).
            STACK_SUFFIX=""
            if [ -n "$STACK_HASH" ]; then
              STACK_SUFFIX="-$STACK_HASH"
            fi
            if [ "$SPLIT_STACKS" = "true" ]; then
              TARGET_STACK="SwarmUi-${{ needs.setup.outputs.cdk_env }}${STACK_SUFFIX}"
            else
              TARGET_STACK="SwarmStack-${{ needs.setup.outputs.cdk_env }}${STACK_SUFFIX}"
            fi

            if aws cloudformation describe-stacks --stack-name "$TARGET_STACK" >/dev/null 2>&1; then
              echo "No infrastructure changes detected - skipping deploy"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "Target stack '$TARGET_STACK' is missing - forcing deploy"
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Infrastructure changes detected - proceeding with deploy"
            cat diff-output.txt
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: CDK Deploy
        if: steps.diff.outputs.skip != 'true'
        working-directory: packages/infra
        env:
          SPLIT_STACKS: ${{ inputs.split_stacks || 'false' }}
          USE_EXISTING_SHARED_RESOURCES: ${{ inputs.use_existing_shared_resources || 'false' }}
          STACK_HASH: ${{ inputs.stack_hash || '' }}
          ADMIN_CERTIFICATE_ARN: ${{ secrets.ADMIN_CERTIFICATE_ARN || '' }}
        run: |
          # Safety: when migrating staging to split stacks (no stack_hash), shared resources already exist.
          # Auto-enable adoption mode to avoid early validation failures.
          if [ "$SPLIT_STACKS" = "true" ] && [ "${{ needs.setup.outputs.cdk_env }}" = "staging" ] && [ -z "$STACK_HASH" ]; then
            USE_EXISTING_SHARED_RESOURCES="true"
          fi

          # Ensure we always use the correct admin domain + cert per environment.
          ADMIN_DOMAIN=$(echo "${{ needs.setup.outputs.admin_url }}" | sed -E 's|^https?://||' | cut -d/ -f1)
          EXTRA_CONTEXT_ARGS="-c adminDomain=${ADMIN_DOMAIN}"

          if [ "${{ needs.setup.outputs.environment }}" = "production" ] && [ -z "$ADMIN_CERTIFICATE_ARN" ]; then
            echo "::error::Missing required environment secret ADMIN_CERTIFICATE_ARN for production"
            exit 1
          fi

          if [ -n "$ADMIN_CERTIFICATE_ARN" ]; then
            EXTRA_CONTEXT_ARGS="${EXTRA_CONTEXT_ARGS} -c adminCertificateArn=${ADMIN_CERTIFICATE_ARN}"
          fi

          HOTSWAP=${{ needs.setup.outputs.cdk_env == 'staging' && '--hotswap-fallback' || '' }}
          STACK="${{ inputs.stack }}"
          npx cdk deploy ${STACK:-'--all'} --require-approval never --concurrency 10 $HOTSWAP -c environment=${{ needs.setup.outputs.cdk_env }} -c splitStacks=$SPLIT_STACKS -c useExistingSharedResources=$USE_EXISTING_SHARED_RESOURCES -c stackHash=$STACK_HASH ${EXTRA_CONTEXT_ARGS}

      - name: Skip Deploy (no changes)
        if: steps.diff.outputs.skip == 'true'
        run: echo "✅ CDK deploy skipped - no infrastructure changes detected"

      - name: Get stack outputs
        id: outputs
        env:
          SPLIT_STACKS: ${{ inputs.split_stacks || 'false' }}
          USE_EXISTING_SHARED_RESOURCES: ${{ inputs.use_existing_shared_resources || 'false' }}
          STACK_HASH: ${{ inputs.stack_hash || '' }}
        run: |
          # In migration mode (staging split stacks without stack_hash), the infra uses a '-split'
          # suffix for non-shared resource names/exports to avoid colliding with legacy exports.
          if [ "$SPLIT_STACKS" = "true" ] && [ "${{ needs.setup.outputs.cdk_env }}" = "staging" ] && [ -z "$STACK_HASH" ]; then
            USE_EXISTING_SHARED_RESOURCES="true"
          fi

          STACK_HASH_SUFFIX=""
          if [ -n "$STACK_HASH" ]; then
            STACK_HASH_SUFFIX="-$STACK_HASH"
          fi

          STACK_ID_SUFFIX=""
          if [ "$SPLIT_STACKS" = "true" ] && [ "$USE_EXISTING_SHARED_RESOURCES" != "true" ]; then
            STACK_ID_SUFFIX="$STACK_HASH_SUFFIX"
          fi

          EXPORT_SUFFIX="$STACK_HASH_SUFFIX"
          if [ "$USE_EXISTING_SHARED_RESOURCES" = "true" ] && [ -z "$STACK_HASH" ]; then
            EXPORT_SUFFIX="-split"
          fi

          # Use UI stack for split stacks, monolithic stack otherwise
          if [ "$SPLIT_STACKS" = "true" ]; then
            STACK="SwarmUi-${{ needs.setup.outputs.cdk_env }}${STACK_ID_SUFFIX}"
          else
            STACK="SwarmStack-${{ needs.setup.outputs.cdk_env }}${STACK_ID_SUFFIX}"
          fi

          echo "bucket=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-bucket-${{ needs.setup.outputs.cdk_env }}${EXPORT_SUFFIX}'].OutputValue" --output text)" >> $GITHUB_OUTPUT
          echo "distribution=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-distribution-${{ needs.setup.outputs.cdk_env }}${EXPORT_SUFFIX}'].OutputValue" --output text)" >> $GITHUB_OUTPUT

  # Admin UI build (runs in parallel with CDK)
  admin-ui-build:
    name: Build Admin UI
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Admin UI
        run: |
          cd packages/admin-ui
          VITE_API_URL=/api \
          VITE_CROSSMINT_PROJECT_ID=${{ secrets.VITE_CROSSMINT_PROJECT_ID }} \
          VITE_PRIVY_APP_ID=${{ secrets.VITE_PRIVY_APP_ID }} \
          pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-ui-dist
          path: packages/admin-ui/dist
          if-no-files-found: error
          retention-days: 1

  # Deploy Admin UI to S3 (after CDK creates/updates bucket)
  stack-outputs:
    name: Stack Outputs
    runs-on: ubuntu-latest
    needs: [setup, cdk-deploy]
    environment: ${{ needs.setup.outputs.environment }}
    outputs:
      bucket: ${{ steps.outputs.outputs.bucket }}
      distribution: ${{ steps.outputs.outputs.distribution }}

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: stack-outputs-${{ needs.setup.outputs.environment }}

      - name: Verify AWS account for environment
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID}"

          if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            if [ "${{ needs.setup.outputs.environment }}" = "production" ]; then
              echo "::error::Missing required environment secret AWS_ACCOUNT_ID for production"
              exit 1
            fi
            echo "::warning::AWS_ACCOUNT_ID secret not set; skipping account guard"
            exit 0
          fi

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for ${{ needs.setup.outputs.environment }} (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID})"
            exit 1
          fi

      - name: Get stack outputs
        id: outputs
        env:
          SPLIT_STACKS: ${{ inputs.split_stacks || 'false' }}
          USE_EXISTING_SHARED_RESOURCES: ${{ inputs.use_existing_shared_resources || 'false' }}
          STACK_HASH: ${{ inputs.stack_hash || '' }}
        run: |
          # In migration mode (staging split stacks without stack_hash), the infra uses a '-split'
          # suffix for non-shared resource names/exports to avoid colliding with legacy exports.
          if [ "$SPLIT_STACKS" = "true" ] && [ "${{ needs.setup.outputs.cdk_env }}" = "staging" ] && [ -z "$STACK_HASH" ]; then
            USE_EXISTING_SHARED_RESOURCES="true"
          fi

          STACK_HASH_SUFFIX=""
          if [ -n "$STACK_HASH" ]; then
            STACK_HASH_SUFFIX="-$STACK_HASH"
          fi

          STACK_ID_SUFFIX=""
          if [ "$SPLIT_STACKS" = "true" ] && [ "$USE_EXISTING_SHARED_RESOURCES" != "true" ]; then
            STACK_ID_SUFFIX="$STACK_HASH_SUFFIX"
          fi

          EXPORT_SUFFIX="$STACK_HASH_SUFFIX"
          if [ "$USE_EXISTING_SHARED_RESOURCES" = "true" ] && [ -z "$STACK_HASH" ]; then
            EXPORT_SUFFIX="-split"
          fi

          # Use UI stack for split stacks, monolithic stack otherwise
          if [ "$SPLIT_STACKS" = "true" ]; then
            STACK="SwarmUi-${{ needs.setup.outputs.cdk_env }}${STACK_ID_SUFFIX}"
          else
            STACK="SwarmStack-${{ needs.setup.outputs.cdk_env }}${STACK_ID_SUFFIX}"
          fi

          echo "bucket=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-bucket-${{ needs.setup.outputs.cdk_env }}${EXPORT_SUFFIX}'].OutputValue" --output text)" >> $GITHUB_OUTPUT
          echo "distribution=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?ExportName=='swarm-admin-ui-distribution-${{ needs.setup.outputs.cdk_env }}${EXPORT_SUFFIX}'].OutputValue" --output text)" >> $GITHUB_OUTPUT

  admin-ui-deploy:
    name: Deploy Admin UI
    runs-on: ubuntu-latest
    needs: [setup, cdk-deploy, admin-ui-build, stack-outputs]
    environment: ${{ needs.setup.outputs.environment }}
    if: >-
      always() &&
      (needs.cdk-deploy.result == 'success' || needs.cdk-deploy.result == 'skipped') &&
      needs.admin-ui-build.result == 'success' &&
      (needs.stack-outputs.result == 'success' || needs.stack-outputs.result == 'skipped')

    steps:
      - name: Download Admin UI build
        uses: actions/download-artifact@v4
        with:
          name: admin-ui-dist
          path: dist

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-ui-${{ needs.setup.outputs.environment }}

      - name: Verify AWS account for environment
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID}"

          if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            if [ "${{ needs.setup.outputs.environment }}" = "production" ]; then
              echo "::error::Missing required environment secret AWS_ACCOUNT_ID for production"
              exit 1
            fi
            echo "::warning::AWS_ACCOUNT_ID secret not set; skipping account guard"
            exit 0
          fi

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for ${{ needs.setup.outputs.environment }} (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID})"
            exit 1
          fi

      - name: Deploy to S3
        run: |
          BUCKET="${{ needs.cdk-deploy.outputs.bucket || needs.stack-outputs.outputs.bucket }}"
          if [ -z "$BUCKET" ] || [ "$BUCKET" = "None" ]; then
            echo "::error::Could not get bucket name from CDK outputs"
            exit 1
          fi
          aws s3 sync dist s3://$BUCKET --delete --cache-control "max-age=31536000,immutable" --exclude "index.html" --exclude "*.json"
          aws s3 cp dist/index.html s3://$BUCKET/index.html --cache-control "no-cache"

      - name: Invalidate CDN
        run: |
          DIST="${{ needs.cdk-deploy.outputs.distribution || needs.stack-outputs.outputs.distribution }}"
          if [ -n "$DIST" ] && [ "$DIST" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id $DIST --paths "/*" --no-cli-pager
            echo "✅ CDN invalidated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Summary
        run: |
          echo "## ✅ Deployed to ${{ needs.setup.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **UI:** ${{ needs.setup.outputs.admin_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** ${{ needs.setup.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY

  e2e:
    name: E2E (Staging)
    runs-on: ubuntu-latest
    needs: [setup, admin-ui-deploy]
    environment: ${{ needs.setup.outputs.environment }}
    if: needs.setup.outputs.environment == 'staging'
    env:
      AWS_REGION: us-east-1
      E2E_TELEGRAM_AGENT_ID: ${{ secrets.E2E_TELEGRAM_AGENT_ID }}
      E2E_WEB_AGENT_ID: ${{ secrets.E2E_WEB_AGENT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: e2e-staging

      - name: Verify AWS account for environment
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID}"

          if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::warning::AWS_ACCOUNT_ID secret not set; skipping account guard"
            exit 0
          fi

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for staging (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID})"
            exit 1
          fi

      - name: Validate E2E inputs
        run: |
          if [ -z "$E2E_TELEGRAM_AGENT_ID" ] || [ -z "$E2E_WEB_AGENT_ID" ]; then
            echo "::error::Missing E2E agent IDs (E2E_TELEGRAM_AGENT_ID, E2E_WEB_AGENT_ID)"
            exit 1
          fi

      - name: Run Telegram E2E
        # Note: Don't set SWARM_ADMIN_API_URL here - all API tests need raw API Gateway
        # to bypass Cloudflare Access (which protects the CloudFront domain)
        run: ./scripts/test-e2e.sh telegram "$E2E_TELEGRAM_AGENT_ID" "ci-telegram-${GITHUB_RUN_ID}" staging

      - name: Run Web E2E
        # Note: Don't set SWARM_ADMIN_API_URL here - all API tests need raw API Gateway
        # to bypass Cloudflare Access (which protects the CloudFront domain)
        run: ./scripts/test-e2e.sh web "$E2E_WEB_AGENT_ID" "ci-web-${GITHUB_RUN_ID}" staging

  browser:
    name: Browser Visual Tests
    runs-on: ubuntu-latest
    needs: [setup, admin-ui-deploy, e2e]
    environment: ${{ needs.setup.outputs.environment }}
    if: |
      needs.setup.outputs.environment == 'staging' &&
      github.event_name == 'workflow_dispatch' &&
      inputs.run_browser_tests == true
    env:
      AWS_REGION: us-east-1
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      TEST_WALLET_PRIVATE_KEY: ${{ secrets.TEST_WALLET_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: browser-staging

      - name: Verify AWS account for environment
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID}"

          if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::warning::AWS_ACCOUNT_ID secret not set; skipping account guard"
            exit 0
          fi

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for staging (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID})"
            exit 1
          fi

      - name: Run Browser Tests
        run: node scripts/test-browser.mjs staging

      - name: Browser Test Summary
        if: always()
        run: |
          echo "## Browser Visual Tests" >> $GITHUB_STEP_SUMMARY
          echo "- **UI:** ${{ needs.setup.outputs.admin_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API:** ${{ needs.setup.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY

          RUN_DIR=$(ls -td test-screenshots/run-* 2>/dev/null | head -n 1 || true)
          if [ -z "$RUN_DIR" ]; then
            echo "- No run directory found under test-screenshots/" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "- **Run:** \`$(basename "$RUN_DIR")\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** browser-screenshots" >> $GITHUB_STEP_SUMMARY

          if [ -f "$RUN_DIR/history.json" ]; then
            RESULT=$(node -e "const h=require('./' + process.argv[1] + '/history.json'); console.log(h.success ? '✅ SUCCESS' : (h.aborted ? '🛑 ABORTED' : '❌ FAILED'));" "$RUN_DIR")
            STEPS=$(node -e "const h=require('./' + process.argv[1] + '/history.json'); console.log(h.steps ?? '');" "$RUN_DIR")
            SUMMARY=$(node -e "const h=require('./' + process.argv[1] + '/history.json'); console.log(h.summary ?? '');" "$RUN_DIR")
            echo "- **Result:** $RESULT" >> $GITHUB_STEP_SUMMARY
            echo "- **Steps:** $STEPS" >> $GITHUB_STEP_SUMMARY
            if [ -n "$SUMMARY" ]; then
              echo "- **Summary:** $SUMMARY" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- history.json not found (test may have crashed early)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$RUN_DIR/report.md" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Report</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat "$RUN_DIR/report.md" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          else
            echo "- report.md not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-screenshots
          path: test-screenshots/
          retention-days: 7
