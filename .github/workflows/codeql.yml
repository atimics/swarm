name: CodeQL

on:
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 06:00 UTC to catch new advisories
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  preflight:
    name: Detect Code Security Availability
    runs-on: ubuntu-latest
    outputs:
      code_security_enabled: ${{ steps.detect.outputs.code_security_enabled }}
    steps:
      - name: Detect repository Code Security setting
        id: detect
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}")

          CODE_SECURITY_STATUS=$(echo "$REPO_JSON" | jq -r '.security_and_analysis.code_security.status // "disabled"')
          if [ "$CODE_SECURITY_STATUS" = "enabled" ]; then
            echo "code_security_enabled=true" >> "$GITHUB_OUTPUT"
            echo "Code Security is enabled; running CodeQL analysis."
          else
            echo "code_security_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Code Security is disabled; CodeQL analysis will be skipped."
          fi

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: preflight
    if: needs.preflight.outputs.code_security_enabled == 'true'

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use the extended security-and-quality query suite for broader coverage
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
          # SARIF results are automatically uploaded to the Security tab

  skipped:
    name: CodeQL Skipped (Code Security Disabled)
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.code_security_enabled != 'true'
    steps:
      - name: Record skip reason
        run: |
          echo "Code Security is disabled for ${GITHUB_REPOSITORY}; skipping CodeQL."
          {
            echo "## CodeQL Skipped"
            echo ""
            echo "Code Security is disabled for this repository."
            echo "Enable it in repository settings to run CodeQL uploads."
          } >> "$GITHUB_STEP_SUMMARY"
