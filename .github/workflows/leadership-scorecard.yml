name: Leadership Operating Scorecard

on:
  schedule:
    # Every Monday at 08:00 AM UTC (before weekly triage)
    - cron: '0 8 * * 1'

  workflow_dispatch:
    inputs:
      environment:
        description: 'AWS environment to query for reliability metrics'
        required: false
        default: 'production'
        type: choice
        options: [production]

permissions:
  issues: read
  contents: read
  actions: read
  id-token: write

env:
  AWS_REGION: us-east-1

jobs:
  scorecard:
    name: Generate Scorecard
    runs-on: ubuntu-latest

    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        continue-on-error: true
        id: aws-auth
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: leadership-scorecard

      - name: Generate markdown report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: bash scripts/leadership-scorecard.sh

      - name: Generate JSON report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          mkdir -p report-artifacts
          bash scripts/leadership-scorecard.sh --json > report-artifacts/leadership-scorecard.json

      - name: Generate markdown artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          bash scripts/leadership-scorecard.sh > report-artifacts/leadership-scorecard.md

      - name: Upload scorecard artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: leadership-scorecard
          path: report-artifacts/
          retention-days: 90
