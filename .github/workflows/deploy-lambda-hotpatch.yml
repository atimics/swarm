name: Deploy Lambda Hotpatch

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options: [production]
      functions:
        description: 'Functions to update (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  fast-deploy:
    name: Fast Lambda Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build handlers
        run: pnpm --filter @swarm/core --filter @swarm/mcp-server --filter @swarm/handlers build

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          # Use dedicated hotpatch role (least-privilege: Lambda code updates only).
          # Falls back to deploy role if hotpatch role secret is not yet configured.
          role-to-assume: ${{ secrets.AWS_HOTPATCH_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: fast-deploy-${{ inputs.environment }}

      - name: Bundle and deploy functions
        env:
          CDK_ENV: prod
          FUNCTIONS: ${{ inputs.functions }}
        run: |
          set -e

          # Define function mappings: handler file -> Lambda function name pattern
          declare -A FUNCTION_MAP=(
            ["message-processor"]="swarm-${CDK_ENV}-message-processor"
            ["telegram-webhook-shared"]="swarm-${CDK_ENV}-telegram-webhook"
            ["response-sender"]="swarm-${CDK_ENV}-response-sender"
            ["media-processor"]="swarm-${CDK_ENV}-media-processor"
            ["twitter-mention-poller"]="swarm-${CDK_ENV}-twitter-mention-poller"
            ["autonomous-tweet-poster"]="swarm-${CDK_ENV}-autonomous-tweet-poster"
          )

          cd packages/handlers

          # Determine which functions to deploy
          if [ "$FUNCTIONS" = "all" ]; then
            DEPLOY_FUNCTIONS="${!FUNCTION_MAP[@]}"
          else
            DEPLOY_FUNCTIONS=$(echo "$FUNCTIONS" | tr ',' ' ')
          fi

          echo "🚀 Fast deploying to ${CDK_ENV}: ${DEPLOY_FUNCTIONS}"

          for handler in $DEPLOY_FUNCTIONS; do
            LAMBDA_NAME="${FUNCTION_MAP[$handler]}"
            if [ -z "$LAMBDA_NAME" ]; then
              echo "⚠️  Unknown handler: $handler, skipping"
              continue
            fi
            
            ENTRY_FILE="src/${handler}.ts"
            if [ ! -f "$ENTRY_FILE" ]; then
              echo "⚠️  Entry file not found: $ENTRY_FILE, skipping"
              continue
            fi
            
            echo "📦 Bundling ${handler}..."
            
            # Bundle with esbuild (same settings as NodejsFunction)
            npx esbuild "$ENTRY_FILE" \
              --bundle \
              --platform=node \
              --target=node20 \
              --format=esm \
              --outfile="/tmp/${handler}/index.mjs" \
              --external:@aws-sdk/* \
              --external:sharp \
              --sourcemap \
              --minify
            
            # Create zip
            cd /tmp/${handler}
            zip -q "${handler}.zip" index.mjs index.mjs.map
            
            echo "⬆️  Uploading ${LAMBDA_NAME}..."
            
            # Update Lambda function code
            aws lambda update-function-code \
              --function-name "$LAMBDA_NAME" \
              --zip-file "fileb://${handler}.zip" \
              --no-cli-pager
            
            echo "✅ ${LAMBDA_NAME} updated"
            cd - > /dev/null
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ Fast Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "Environment: **${CDK_ENV}**" >> $GITHUB_STEP_SUMMARY
          echo "Functions: ${DEPLOY_FUNCTIONS}" >> $GITHUB_STEP_SUMMARY
