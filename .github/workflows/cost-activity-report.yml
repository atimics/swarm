name: Cost & Activity Report

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to report on
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      days:
        description: Days in report window (1-30)
        required: true
        default: '7'
        type: string
      include_aws_cost:
        description: Query AWS Cost Explorer
        required: true
        default: true
        type: boolean
  schedule:
    - cron: '20 6 * * 1'

permissions:
  contents: read
  actions: read
  id-token: write

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

jobs:
  report:
    name: Generate report
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Select role ARN for environment
        id: role
        env:
          REPORTING_ROLE: ${{ secrets.AWS_REPORTING_ROLE_ARN }}
          DEPLOY_ROLE: ${{ secrets.AWS_ROLE_ARN }}
          EXPECTED_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
        run: |
          set -euo pipefail

          # Extract the 12-digit account ID embedded in an IAM role ARN.
          extract_account() {
            echo "$1" | grep -oE 'arn:aws:iam::[0-9]{12}:' | grep -oE '[0-9]{12}' || true
          }

          REPORTING_ACCOUNT=$(extract_account "${REPORTING_ROLE:-}")
          DEPLOY_ACCOUNT=$(extract_account "${DEPLOY_ROLE:-}")

          echo "Target environment: ${TARGET_ENV}"
          echo "Expected account:   ${EXPECTED_ACCOUNT:-<not set>}"
          echo "Reporting role account: ${REPORTING_ACCOUNT:-<not set>}"
          echo "Deploy role account:    ${DEPLOY_ACCOUNT:-<not set>}"

          if [ -z "$EXPECTED_ACCOUNT" ]; then
            echo "::error::Missing required environment secret AWS_ACCOUNT_ID for '${TARGET_ENV}'"
            exit 1
          fi

          # Prefer the dedicated reporting role, but only if its account matches
          # the expected account for this environment. This prevents a
          # cross-account mismatch when a reporting role ARN from another
          # environment leaks into the current one (e.g. prod role used in staging).
          SELECTED_ROLE=""
          if [ -n "$REPORTING_ACCOUNT" ] && [ "$REPORTING_ACCOUNT" = "$EXPECTED_ACCOUNT" ]; then
            SELECTED_ROLE="$REPORTING_ROLE"
            echo "Using AWS_REPORTING_ROLE_ARN (account ${REPORTING_ACCOUNT} matches ${TARGET_ENV})"
          elif [ -n "${REPORTING_ROLE:-}" ] && [ "$REPORTING_ACCOUNT" != "$EXPECTED_ACCOUNT" ]; then
            echo "::warning::AWS_REPORTING_ROLE_ARN targets account ${REPORTING_ACCOUNT} but ${TARGET_ENV} expects ${EXPECTED_ACCOUNT}. Falling back to AWS_ROLE_ARN."
          fi

          if [ -z "$SELECTED_ROLE" ]; then
            if [ -z "${DEPLOY_ROLE:-}" ]; then
              echo "::error::Neither AWS_REPORTING_ROLE_ARN nor AWS_ROLE_ARN is configured for '${TARGET_ENV}'"
              exit 1
            fi
            if [ -n "$DEPLOY_ACCOUNT" ] && [ "$DEPLOY_ACCOUNT" != "$EXPECTED_ACCOUNT" ]; then
              echo "::error::AWS_ROLE_ARN targets account ${DEPLOY_ACCOUNT} but ${TARGET_ENV} expects ${EXPECTED_ACCOUNT}. Check GitHub environment secrets."
              exit 1
            fi
            SELECTED_ROLE="$DEPLOY_ROLE"
            echo "Using AWS_ROLE_ARN (fallback)"
          fi

          echo "role_arn=${SELECTED_ROLE}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ steps.role.outputs.role_arn }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: cost-activity-report

      - name: Verify AWS account for environment
        env:
          TARGET_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID} (environment: ${TARGET_ENV})"

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for ${TARGET_ENV} (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID}). Check that AWS_REPORTING_ROLE_ARN and AWS_ROLE_ARN in the '${TARGET_ENV}' GitHub environment point to the correct account."
            exit 1
          fi

      - name: Resolve report inputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ inputs.environment }}"
            DAYS="${{ inputs.days }}"
            INCLUDE_AWS_COST="${{ inputs.include_aws_cost }}"
          else
            TARGET_ENV="staging"
            DAYS="7"
            INCLUDE_AWS_COST="true"
          fi

          if [ "$TARGET_ENV" = "production" ]; then
            CDK_ENV="prod"
          else
            CDK_ENV="$TARGET_ENV"
          fi

          STACK_NAME="SwarmApi-${CDK_ENV}"

          ADMIN_TABLE=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?contains(OutputKey, 'AdminTableName')].OutputValue | [0]" \
            --output text)

          if [ -z "$ADMIN_TABLE" ] || [ "$ADMIN_TABLE" = "None" ]; then
            echo "::error::Could not resolve AdminTableName from stack $STACK_NAME"
            exit 1
          fi

          echo "target_env=$TARGET_ENV" >> "$GITHUB_OUTPUT"
          echo "days=$DAYS" >> "$GITHUB_OUTPUT"
          echo "include_aws_cost=$INCLUDE_AWS_COST" >> "$GITHUB_OUTPUT"
          echo "admin_table=$ADMIN_TABLE" >> "$GITHUB_OUTPUT"

      - name: Generate report files
        env:
          ADMIN_TABLE: ${{ steps.resolve.outputs.admin_table }}
          REPORT_ENV: ${{ steps.resolve.outputs.target_env }}
          COST_PER_MESSAGE_USD: ${{ vars.COST_PER_MESSAGE_USD }}
          COST_PER_MEDIA_CREDIT_USD: ${{ vars.COST_PER_MEDIA_CREDIT_USD }}
          COST_PER_VOICE_MINUTE_USD: ${{ vars.COST_PER_VOICE_MINUTE_USD }}
          COST_PER_TOOL_CALL_USD: ${{ vars.COST_PER_TOOL_CALL_USD }}
          COST_PER_IMAGE_GEN_USD: ${{ vars.COST_PER_IMAGE_GEN_USD }}
          COST_PER_VIDEO_GEN_USD: ${{ vars.COST_PER_VIDEO_GEN_USD }}
          COST_PER_STICKER_GEN_USD: ${{ vars.COST_PER_STICKER_GEN_USD }}
          MONTHLY_BUDGET_USD: ${{ vars.MONTHLY_BUDGET_USD }}
        run: |
          mkdir -p test-outputs/reports
          node scripts/generate-cost-activity-report.mjs \
            --days "${{ steps.resolve.outputs.days }}" \
            --environment "${{ steps.resolve.outputs.target_env }}" \
            --include-aws-cost "${{ steps.resolve.outputs.include_aws_cost }}" \
            --output "test-outputs/reports/cost-activity-${{ steps.resolve.outputs.target_env }}.md" \
            --json-output "test-outputs/reports/cost-activity-${{ steps.resolve.outputs.target_env }}.json"

      - name: Publish report preview
        run: |
          REPORT_FILE="test-outputs/reports/cost-activity-${{ steps.resolve.outputs.target_env }}.md"
          {
            echo "## Report Preview"
            echo ""
            sed -n '1,120p' "$REPORT_FILE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cost-activity-report-${{ steps.resolve.outputs.target_env }}
          path: |
            test-outputs/reports/cost-activity-${{ steps.resolve.outputs.target_env }}.md
            test-outputs/reports/cost-activity-${{ steps.resolve.outputs.target_env }}.json
          if-no-files-found: error
          retention-days: 14
