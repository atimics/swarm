name: Release Gate

# Single required status check that aggregates all quality gates.
# Configure this as the sole required check in branch protection for `main`.
#
# See .github/policy/release-gate-policy.md for the full policy spec.

on:
  pull_request:
    branches: [main]

concurrency:
  group: release-gate-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  # ── Gate 1: Security audit ────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: ./scripts/audit-with-exceptions.sh

  # ── Gate 2: Lint + typecheck ──────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r run --if-present lint

      - name: Check circular dependencies
        run: pnpm check:circular

      - name: Build (required for cross-package typecheck)
        env:
          VITE_API_URL: /api
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r run --if-present typecheck

  # ── Gate 3: Build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        env:
          VITE_API_URL: /api
          VITE_CROSSMINT_PROJECT_ID: ${{ secrets.VITE_CROSSMINT_PROJECT_ID }}
          VITE_PRIVY_APP_ID: ${{ secrets.VITE_PRIVY_APP_ID }}
        run: pnpm -r build

      - name: Validate build artifacts exist
        run: |
          MISSING=0

          for PKG_DIR in packages/*/; do
            PKG_NAME=$(basename "$PKG_DIR")

            # Skip packages that do not produce dist/ output
            case "$PKG_NAME" in
              plan-tests|layer|infra) continue ;;
            esac

            if [ -f "$PKG_DIR/tsconfig.json" ] || [ -f "$PKG_DIR/vite.config.ts" ] || [ -f "$PKG_DIR/vite.config.mts" ]; then
              if [ ! -d "$PKG_DIR/dist" ]; then
                echo "::error::Missing build output: $PKG_DIR/dist"
                MISSING=1
              fi
            fi
          done

          if [ "$MISSING" -eq 1 ]; then
            echo "::error::One or more packages failed to produce build artifacts."
            exit 1
          fi
          echo "All expected build artifacts present."

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-gate-build
          path: packages/*/dist
          retention-days: 1

  # ── Gate 4: Tests ─────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-gate-build
          path: packages

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: |
          bun test --coverage --coverage-reporter=text --coverage-reporter=lcov 2>&1 | tee /tmp/coverage-output.txt

      - name: Enforce coverage threshold (40%)
        run: ./scripts/check-coverage.sh /tmp/coverage-output.txt 40

  # ── Gate 5: PR evidence (risk level, rollback plan) ───────────────────
  pr-evidence:
    name: PR Evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check PR body for required evidence
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          MISSING=()

          # Check for risk level selection
          if ! echo "$PR_BODY" | grep -qE '\[x\]\s*(Low|Medium|High|Critical)'; then
            MISSING+=("Risk Level (select one: Low / Medium / High / Critical)")
          fi

          # Check for rollback plan
          if ! echo "$PR_BODY" | grep -qiE '(rollback|roll back)'; then
            MISSING+=("Rollback Plan")
          fi

          # Check for validation commands
          if ! echo "$PR_BODY" | grep -qiE '(validation|verify|how to test|test plan)'; then
            MISSING+=("Validation / Test Plan")
          fi

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::PR is missing required release gate evidence:"
            for item in "${MISSING[@]}"; do
              echo "  - $item"
            done
            echo ""
            echo "Update your PR description using the PR template to include all required sections."
            exit 1
          fi

          echo "All required PR evidence is present."

  # ── Gate 6: Release notes for version tags ────────────────────────────
  release-notes-check:
    name: Release Notes Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for release note content on version-tagged PRs
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail

          # Only enforce release notes if the PR is labeled 'release' or title starts with a version
          IS_RELEASE="false"
          if echo "$PR_LABELS" | grep -qi 'release'; then
            IS_RELEASE="true"
          fi
          if echo "$PR_TITLE" | grep -qE '^v[0-9]+\.[0-9]+'; then
            IS_RELEASE="true"
          fi

          if [ "$IS_RELEASE" = "false" ]; then
            echo "Not a release PR — skipping release notes check."
            exit 0
          fi

          # For release PRs, require a changelog / release notes section
          if ! echo "$PR_BODY" | grep -qiE '(changelog|release notes|what.s new|breaking changes)'; then
            echo "::error::Release PRs must include a Changelog or Release Notes section in the PR body."
            exit 1
          fi

          echo "Release notes section found."

  # ── Unified gate: single required status check ────────────────────────
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - security-audit
      - lint
      - build
      - test
      - pr-evidence
      - release-notes-check
    steps:
      - name: Evaluate gate results
        run: |
          set -euo pipefail

          echo "## Release Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          ALL_PASSED=true

          evaluate() {
            local name="$1"
            local result="$2"

            if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
              echo "| $name | Passed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $name | **FAILED** |" >> "$GITHUB_STEP_SUMMARY"
              ALL_PASSED=false
            fi
          }

          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          evaluate "Security Audit"       "${{ needs.security-audit.result }}"
          evaluate "Lint & Typecheck"      "${{ needs.lint.result }}"
          evaluate "Build"                 "${{ needs.build.result }}"
          evaluate "Test"                  "${{ needs.test.result }}"
          evaluate "PR Evidence"           "${{ needs.pr-evidence.result }}"
          evaluate "Release Notes Check"   "${{ needs.release-notes-check.result }}"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$ALL_PASSED" = "false" ]; then
            echo "::error::Release gate FAILED. One or more required checks did not pass."
            echo "**Release gate: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "**Release gate: PASSED**" >> "$GITHUB_STEP_SUMMARY"
          echo "All release gate checks passed."
