name: Issue Sync (Deprecated)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deprecated:
    name: Deprecated workflow notice
    runs-on: ubuntu-latest
    steps:
      - name: Explain deprecation
        run: |
          echo "Issue sync is deprecated."
          echo "GitHub Issues is now the source of truth."
          echo "Do not manage issues via files in issues/open/."
          echo "Use: scripts/sync-issues-mirror.mjs to refresh local read-only mirror reports."
