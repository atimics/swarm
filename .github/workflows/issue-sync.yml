name: Issue Sync

on:
  push:
    branches: [main]
    paths:
      - 'issues/open/**'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without creating/updating issues'
        required: false
        default: false
        type: boolean

permissions:
  issues: write
  contents: read

jobs:
  sync:
    name: Sync Issues
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'type:bug',        color: 'D73A4A', description: 'Bug report' },
              { name: 'type:feature',    color: '1D76DB', description: 'New feature request' },
              { name: 'type:security',   color: 'B60205', description: 'Security related' },
              { name: 'type:docs',       color: '0075CA', description: 'Documentation' },
              { name: 'type:infra',      color: '7057FF', description: 'Infrastructure changes' },
              { name: 'priority:high',   color: 'D93F0B', description: 'High priority' },
              { name: 'priority:medium', color: 'FBCA04', description: 'Medium priority' },
              { name: 'priority:low',    color: '0E8A16', description: 'Low priority' },
              { name: 'package:core',    color: 'C5DEF5', description: 'Affects core package' },
              { name: 'package:admin',   color: 'C5DEF5', description: 'Affects admin packages' },
              { name: 'package:infra',   color: 'C5DEF5', description: 'Affects infrastructure' },
              { name: 'package:handlers',color: 'C5DEF5', description: 'Affects handlers package' },
              { name: 'status:in-progress', color: 'EDEDED', description: 'Currently being worked on' },
              { name: 'managed:issue-sync', color: '6E40C9', description: 'Managed by issues/open/ sync' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label,
                  });
                  console.log(`Created label: ${label.name}`);
                }
              }
            }

      - name: Sync issues from YAML files
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const dryRun = process.env.DRY_RUN === 'true';
            const issueDir = 'issues/open';
            const SYNC_LABEL = 'managed:issue-sync';

            // Minimal YAML parser (handles our simple flat + body format)
            function parseIssueYaml(content) {
              const result = { labels: [], assignees: [] };
              const lines = content.split('\n');
              let inBody = false;
              let inList = null;
              let bodyLines = [];

              for (const line of lines) {
                if (inBody) {
                  // Body is indented block scalar — strip 2-space indent
                  bodyLines.push(line.replace(/^  /, ''));
                  continue;
                }

                const bodyMatch = line.match(/^body:\s*\|/);
                if (bodyMatch) {
                  inBody = true;
                  continue;
                }

                // List items (labels, assignees)
                const listItem = line.match(/^\s+-\s+(.+)/);
                if (listItem && inList) {
                  result[inList].push(listItem[1].trim());
                  continue;
                }

                // Check for list-starting keys
                const listKey = line.match(/^(labels|assignees):\s*$/);
                if (listKey) {
                  inList = listKey[1];
                  continue;
                }

                // Scalar fields
                const scalar = line.match(/^(\w+):\s*"?([^"]*)"?\s*$/);
                if (scalar) {
                  inList = null;
                  result[scalar[1]] = scalar[2].trim();
                }
              }

              result.body = bodyLines.join('\n').trim();
              return result;
            }

            // Read all YAML issue files
            if (!fs.existsSync(issueDir)) {
              console.log('No issues/open/ directory found');
              return;
            }

            const files = fs.readdirSync(issueDir)
              .filter(f => f.endsWith('.yml') || f.endsWith('.yaml'))
              .sort();

            console.log(`Found ${files.length} issue files`);

            // Fetch existing synced issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: SYNC_LABEL,
              state: 'all',
              per_page: 100,
            });

            // Build lookup: issue-sync-id footer -> issue number
            // Filter out pull requests to avoid managing them
            const issueMap = new Map();
            for (const issue of existing.data) {
              // Skip pull requests
              if (issue.pull_request) continue;
              
              const match = issue.body?.match(/<!-- issue-sync-id: (.+?) -->/);
              if (match) {
                issueMap.set(match[1], issue);
              }
            }

            const summary = { created: 0, updated: 0, skipped: 0 };

            for (const file of files) {
              const content = fs.readFileSync(path.join(issueDir, file), 'utf8');
              const issue = parseIssueYaml(content);
              const syncId = file.replace(/\.(yml|yaml)$/, '');
              const footer = `\n\n---\n*Synced from \`issues/open/${file}\`*\n<!-- issue-sync-id: ${syncId} -->`;
              const body = issue.body + footer;
              const labels = [...(issue.labels || []), SYNC_LABEL];

              // Filter assignees — only use valid GitHub logins (not bot accounts
              // which may need different handling)
              const assignees = (issue.assignees || []).filter(a => !a.includes('[bot]'));

              const existingIssue = issueMap.get(syncId);

              if (existingIssue) {
                // Check if update needed
                const titleChanged = existingIssue.title !== issue.title;
                const bodyChanged = existingIssue.body?.replace(footer, '') !== issue.body;
                
                // Check if labels changed (compare sorted arrays)
                const existingLabels = existingIssue.labels.map(l => l.name).sort();
                const newLabels = [...labels].sort();
                const labelsChanged = JSON.stringify(existingLabels) !== JSON.stringify(newLabels);
                
                // Check if assignees changed
                const existingAssignees = (existingIssue.assignees || []).map(a => a.login).sort();
                const newAssignees = [...assignees].sort();
                const assigneesChanged = JSON.stringify(existingAssignees) !== JSON.stringify(newAssignees);

                if (!titleChanged && !bodyChanged && !labelsChanged && !assigneesChanged) {
                  console.log(`⏭️  ${syncId}: no changes`);
                  summary.skipped++;
                  continue;
                }

                if (dryRun) {
                  console.log(`🔄 [DRY RUN] Would update #${existingIssue.number}: ${issue.title}`);
                  summary.updated++;
                  continue;
                }

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existingIssue.number,
                  title: issue.title,
                  body: body,
                  labels: labels,
                  assignees: assignees,
                });
                console.log(`🔄 Updated #${existingIssue.number}: ${issue.title}`);
                summary.updated++;
              } else {
                if (dryRun) {
                  console.log(`✨ [DRY RUN] Would create: ${issue.title}`);
                  summary.created++;
                  continue;
                }

                const created = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: body,
                  labels: labels,
                  assignees: assignees,
                });
                console.log(`✨ Created #${created.data.number}: ${issue.title}`);
                summary.created++;
              }
            }

            // Check for issues that were removed from files (close them)
            const activeIds = new Set(files.map(f => f.replace(/\.(yml|yaml)$/, '')));
            for (const [syncId, issue] of issueMap) {
              if (!activeIds.has(syncId) && issue.state === 'open') {
                if (dryRun) {
                  console.log(`🗑️  [DRY RUN] Would close #${issue.number}: ${issue.title} (file removed)`);
                  continue;
                }

                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: '🤖 Closed by issue-sync: source file removed from `issues/open/`.',
                });
                console.log(`🗑️  Closed #${issue.number}: ${issue.title}`);
              }
            }

            const mode = dryRun ? ' (DRY RUN)' : '';
            const msg = `## Issue Sync${mode}\n\n- Created: ${summary.created}\n- Updated: ${summary.updated}\n- Skipped: ${summary.skipped}`;
            core.summary.addRaw(msg);
            await core.summary.write();
            console.log(`\nDone: ${summary.created} created, ${summary.updated} updated, ${summary.skipped} skipped`);
