name: Deploy CDK (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      cdk_env:
        required: true
        type: string
      admin_url:
        required: true
        type: string
      use_existing_buckets:
        required: true
        type: boolean
      skip_domain_aliases:
        required: true
        type: boolean
      stack_hash:
        required: false
        type: string
        default: ''
      stack:
        required: false
        type: string
        default: ''
      use_hotswap:
        required: true
        type: boolean
    secrets:
      AWS_ROLE_ARN:
        required: true
      AWS_ACCOUNT_ID:
        required: false
      ADMIN_CERTIFICATE_ARN:
        required: false
    outputs:
      distribution:
        value: ${{ jobs.cdk-deploy.outputs.distribution }}

env:
  NODE_VERSION: '20'
  NODE_OPTIONS: '--max-old-space-size=4096'
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  cdk-deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      distribution: ${{ steps.outputs.outputs.distribution }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Cache Lambda Layer
        id: layer-cache
        uses: actions/cache@v4
        with:
          path: packages/layer/nodejs
          key: layer-${{ hashFiles('packages/layer/package.json', 'packages/layer/node-fetch-shim/**', 'packages/layer/abort-controller-shim/**') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          if [ "${{ steps.layer-cache.outputs.cache-hit }}" != "true" ]; then
            cd packages/layer && pnpm run build:layer && cd ../..
          fi
          pnpm -r --filter '!admin-ui' build

      - name: Validate AWS environment secrets
        run: |
          ROLE_ARN="${{ secrets.AWS_ROLE_ARN }}"
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ADMIN_CERTIFICATE_ARN="${{ secrets.ADMIN_CERTIFICATE_ARN }}"

          if [ -z "$ROLE_ARN" ]; then
            echo "::error::Missing required environment secret AWS_ROLE_ARN"
            exit 1
          fi

          if [ "${{ inputs.environment }}" = "staging" ] || [ "${{ inputs.environment }}" = "production" ]; then
            if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
              echo "::error::Missing required environment secret AWS_ACCOUNT_ID for ${{ inputs.environment }}"
              exit 1
            fi

            if [[ "$ROLE_ARN" != arn:aws:iam::${EXPECTED_AWS_ACCOUNT_ID}:role/* ]]; then
              echo "::error::AWS_ROLE_ARN does not match AWS_ACCOUNT_ID (role='$ROLE_ARN', expected account='${EXPECTED_AWS_ACCOUNT_ID}')"
              exit 1
            fi

            if [ -z "$ADMIN_CERTIFICATE_ARN" ]; then
              echo "::error::Missing required environment secret ADMIN_CERTIFICATE_ARN for ${{ inputs.environment }}"
              exit 1
            fi
          fi

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-cdk-${{ inputs.environment }}

      - name: Verify AWS account for environment
        run: |
          EXPECTED_AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ACTUAL_AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "Using AWS account: ${ACTUAL_AWS_ACCOUNT_ID}"

          if [ -z "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            if [ "${{ inputs.environment }}" = "staging" ] || [ "${{ inputs.environment }}" = "production" ]; then
              echo "::error::Missing required environment secret AWS_ACCOUNT_ID for ${{ inputs.environment }}"
              exit 1
            fi
            echo "::warning::AWS_ACCOUNT_ID secret not set; skipping account guard"
            exit 0
          fi

          if [ "$ACTUAL_AWS_ACCOUNT_ID" != "$EXPECTED_AWS_ACCOUNT_ID" ]; then
            echo "::error::Wrong AWS account for ${{ inputs.environment }} (expected ${EXPECTED_AWS_ACCOUNT_ID}, got ${ACTUAL_AWS_ACCOUNT_ID})"
            exit 1
          fi

      - name: Ensure CDK bootstrap
        working-directory: packages/infra
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          if aws ssm get-parameter --name "/cdk-bootstrap/hnb659fds/version" --region "${AWS_REGION}" >/dev/null 2>&1; then
            echo "✅ CDK bootstrap already present in ${ACCOUNT_ID}/${AWS_REGION}"
            exit 0
          fi

          echo "⚠️  CDK bootstrap missing in ${ACCOUNT_ID}/${AWS_REGION}; bootstrapping now"
          npx cdk bootstrap "aws://${ACCOUNT_ID}/${AWS_REGION}" --require-approval never

      - name: Clean stale CDK output
        working-directory: packages/infra
        run: rm -rf cdk.out

      - name: Delete ROLLBACK_COMPLETE stacks
        env:
          STACK_HASH: ${{ inputs.stack_hash }}
        run: |
          STACK_SUFFIX=""
          if [ -n "$STACK_HASH" ]; then
            STACK_SUFFIX="-$STACK_HASH"
          fi

          DELETED_STACKS=""
          for STACK_NAME in "SwarmShared-${{ inputs.cdk_env }}${STACK_SUFFIX}" "SwarmApi-${{ inputs.cdk_env }}${STACK_SUFFIX}" "SwarmUi-${{ inputs.cdk_env }}${STACK_SUFFIX}"; do
            STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
            if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
              echo "⚠️ Stack '$STACK_NAME' is in ROLLBACK_COMPLETE state — deleting before redeploy"
              aws cloudformation delete-stack --stack-name "$STACK_NAME"
              aws cloudformation wait stack-delete-complete --stack-name "$STACK_NAME"
              echo "✅ Deleted '$STACK_NAME'"
              DELETED_STACKS="$DELETED_STACKS $STACK_NAME"
            fi
          done

      - name: Clean orphaned log groups
        env:
          STACK_HASH: ${{ inputs.stack_hash }}
        run: |
          STACK_SUFFIX=""
          if [ -n "$STACK_HASH" ]; then
            STACK_SUFFIX="-$STACK_HASH"
          fi

          # Delete ECS log groups whose parent stack doesn't exist (orphaned by RETAIN policy)
          for LG in $(aws logs describe-log-groups --log-group-name-prefix "/ecs/swarm-" --query 'logGroups[].logGroupName' --output text 2>/dev/null); do
            if [[ "$LG" == *"-${{ inputs.cdk_env }}${STACK_SUFFIX}"* ]]; then
              # Check if the parent stack exists
              PARENT_STACK="SwarmApi-${{ inputs.cdk_env }}${STACK_SUFFIX}"
              STATUS=$(aws cloudformation describe-stacks --stack-name "$PARENT_STACK" --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "DOES_NOT_EXIST")
              if [ "$STATUS" = "DOES_NOT_EXIST" ] || [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
                echo "Deleting orphaned log group: $LG (parent stack $PARENT_STACK is $STATUS)"
                aws logs delete-log-group --log-group-name "$LG" || true
              fi
            fi
          done

      - name: CDK Diff
        id: diff
        working-directory: packages/infra
        env:
          USE_EXISTING_BUCKETS: ${{ inputs.use_existing_buckets && 'true' || 'false' }}
          SKIP_DOMAIN_ALIASES: ${{ inputs.skip_domain_aliases && 'true' || 'false' }}
          STACK_HASH: ${{ inputs.stack_hash }}
          ADMIN_CERTIFICATE_ARN: ${{ secrets.ADMIN_CERTIFICATE_ARN || '' }}
        run: |
          ADMIN_DOMAIN=$(echo "${{ inputs.admin_url }}" | sed -E 's|^https?://||' | cut -d/ -f1)
          EXTRA_CONTEXT_ARGS="-c adminDomain=${ADMIN_DOMAIN}"

          if [ "${{ inputs.environment }}" = "production" ] && [ -z "$ADMIN_CERTIFICATE_ARN" ]; then
            echo "::error::Missing required environment secret ADMIN_CERTIFICATE_ARN for production"
            exit 1
          fi

          if [ -n "$ADMIN_CERTIFICATE_ARN" ]; then
            EXTRA_CONTEXT_ARGS="${EXTRA_CONTEXT_ARGS} -c adminCertificateArn=${ADMIN_CERTIFICATE_ARN}"
          fi

          STACK="${{ inputs.stack }}"
          echo "Checking for infrastructure changes..."
          set +e
          set -o pipefail
          if [ -n "$STACK" ]; then
            DIFF_TARGETS="$STACK"
          else
            DIFF_TARGETS="--all"
          fi

          npx cdk diff --fail $DIFF_TARGETS -c environment=${{ inputs.cdk_env }} -c useExistingBuckets=$USE_EXISTING_BUCKETS -c skipDomainAliases=$SKIP_DOMAIN_ALIASES -c stackHash=$STACK_HASH ${EXTRA_CONTEXT_ARGS} 2>&1 | tee diff-output.txt
          DIFF_EXIT=$?
          set +o pipefail
          set -e

          if [ $DIFF_EXIT -gt 1 ]; then
            echo "::error::cdk diff failed (exit $DIFF_EXIT)"
            cat diff-output.txt
            exit $DIFF_EXIT
          fi

          if [ $DIFF_EXIT -eq 0 ]; then
            if [ -n "$STACK" ]; then
              TARGET_STACKS="$STACK"
            else
              STACK_SUFFIX=""
              if [ -n "$STACK_HASH" ]; then
                STACK_SUFFIX="-$STACK_HASH"
              fi
              TARGET_STACKS="SwarmUi-${{ inputs.cdk_env }}${STACK_SUFFIX}"
            fi

            MISSING_STACK="false"
            for TARGET_STACK in $TARGET_STACKS; do
              if ! aws cloudformation describe-stacks --stack-name "$TARGET_STACK" >/dev/null 2>&1; then
                echo "Target stack '$TARGET_STACK' is missing - forcing deploy"
                MISSING_STACK="true"
                break
              fi
            done

            if [ "$MISSING_STACK" = "false" ]; then
              echo "No infrastructure changes detected - skipping deploy"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Infrastructure changes detected - proceeding with deploy"
            cat diff-output.txt
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: CDK Deploy
        if: steps.diff.outputs.skip != 'true'
        working-directory: packages/infra
        env:
          USE_EXISTING_BUCKETS: ${{ inputs.use_existing_buckets && 'true' || 'false' }}
          SKIP_DOMAIN_ALIASES: ${{ inputs.skip_domain_aliases && 'true' || 'false' }}
          STACK_HASH: ${{ inputs.stack_hash }}
          ADMIN_CERTIFICATE_ARN: ${{ secrets.ADMIN_CERTIFICATE_ARN || '' }}
        run: |
          # Clean cdk.out from diff step to prevent recursive asset copy
          rm -rf cdk.out

          ADMIN_DOMAIN=$(echo "${{ inputs.admin_url }}" | sed -E 's|^https?://||' | cut -d/ -f1)
          EXTRA_CONTEXT_ARGS="-c adminDomain=${ADMIN_DOMAIN}"

          if [ "${{ inputs.environment }}" = "production" ] && [ -z "$ADMIN_CERTIFICATE_ARN" ]; then
            echo "::error::Missing required environment secret ADMIN_CERTIFICATE_ARN for production"
            exit 1
          fi

          if [ -n "$ADMIN_CERTIFICATE_ARN" ]; then
            EXTRA_CONTEXT_ARGS="${EXTRA_CONTEXT_ARGS} -c adminCertificateArn=${ADMIN_CERTIFICATE_ARN}"
          fi

          HOTSWAP=""
          if [ "${{ inputs.use_hotswap && 'true' || 'false' }}" = "true" ]; then
            HOTSWAP="--hotswap-fallback"
          fi
          STACK="${{ inputs.stack }}"

          if [ -n "$STACK" ]; then
            npx cdk deploy "$STACK" --require-approval never --concurrency 10 $HOTSWAP -c environment=${{ inputs.cdk_env }} -c useExistingBuckets=$USE_EXISTING_BUCKETS -c skipDomainAliases=$SKIP_DOMAIN_ALIASES -c stackHash=$STACK_HASH ${EXTRA_CONTEXT_ARGS}
            exit 0
          fi

          npx cdk deploy --all --require-approval never --concurrency 10 $HOTSWAP -c environment=${{ inputs.cdk_env }} -c useExistingBuckets=$USE_EXISTING_BUCKETS -c skipDomainAliases=$SKIP_DOMAIN_ALIASES -c stackHash=$STACK_HASH ${EXTRA_CONTEXT_ARGS}

      - name: Skip Deploy (no changes)
        if: steps.diff.outputs.skip == 'true'
        run: echo "✅ CDK deploy skipped - no infrastructure changes detected"

      - name: Get stack outputs
        id: outputs
        env:
          STACK_HASH: ${{ inputs.stack_hash }}
        run: |
          STACK_SUFFIX=""
          if [ -n "$STACK_HASH" ]; then
            STACK_SUFFIX="-$STACK_HASH"
          fi

          STACK="SwarmUi-${{ inputs.cdk_env }}${STACK_SUFFIX}"

          # Query by OutputKey (stable CDK construct ID) instead of ExportName
          # which may include a -split suffix from useExistingResources mode.
          DIST=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].Outputs[?starts_with(OutputKey,`AdminUiDistributionId`)].OutputValue | [0]' \
            --output text)
          echo "distribution=$DIST" >> $GITHUB_OUTPUT

      - name: Associate domain alias (if skipped during deployment)
        if: inputs.skip_domain_aliases && steps.outputs.outputs.distribution != ''
        env:
          DISTRIBUTION_ID: ${{ steps.outputs.outputs.distribution }}
          ADMIN_DOMAIN: ${{ inputs.admin_url }}
        run: |
          DOMAIN=$(echo "$ADMIN_DOMAIN" | sed -E 's|^https?://||' | cut -d/ -f1)

          echo "Attempting to associate domain alias '$DOMAIN' with distribution '$DISTRIBUTION_ID'..."

          if aws cloudfront associate-alias --target-distribution-id "$DISTRIBUTION_ID" --alias "$DOMAIN" 2>&1; then
            echo "✅ Successfully associated '$DOMAIN' with distribution '$DISTRIBUTION_ID'"
          else
            echo "⚠️ Could not associate alias. You may need to:"
            echo "   1. Add a TXT record '_cf-domain-ownership.$DOMAIN' with value '$DISTRIBUTION_ID'"
            echo "   2. Or contact AWS Support to release the orphaned CNAME"
            echo ""
            echo "After adding the TXT record, retry with: aws cloudfront associate-alias --target-distribution-id $DISTRIBUTION_ID --alias $DOMAIN"
          fi

          if [ "${{ inputs.environment }}" = "production" ]; then
            WILDCARD=$(echo "$DOMAIN" | sed 's/^[^.]*/*./')
            echo "Attempting to associate wildcard alias '$WILDCARD' with distribution '$DISTRIBUTION_ID'..."
            aws cloudfront associate-alias --target-distribution-id "$DISTRIBUTION_ID" --alias "$WILDCARD" 2>&1 || echo "⚠️ Could not associate wildcard alias"
          fi
