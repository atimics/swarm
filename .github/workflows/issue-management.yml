name: Issue Management

on:
  issues:
    types: [opened, assigned]

permissions:
  issues: write

jobs:
  # Auto-label issues based on title
  auto-label:
    name: Auto Label Issues
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'

    steps:
      - name: Add package labels based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            // Package labels
            if (title.includes('core') || title.includes('adapter') || title.includes('processor')) {
              labels.push('package:core');
            }
            if (title.includes('admin') || title.includes('ui') || title.includes('chat')) {
              labels.push('package:admin');
            }
            if (title.includes('infra') || title.includes('cdk') || title.includes('lambda')) {
              labels.push('package:infra');
            }
            if (title.includes('handler') || title.includes('webhook')) {
              labels.push('package:handlers');
            }

            // Priority based on keywords
            if (title.includes('urgent') || title.includes('critical') || title.includes('broken')) {
              labels.push('priority:high');
            }

            // Security
            if (title.includes('security') || title.includes('secret') || title.includes('auth')) {
              labels.push('type:security');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }

  # Mark issue as in-progress when assigned
  mark-in-progress:
    name: Mark In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'assigned'

    steps:
      - name: Add in-progress label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: ['status:in-progress']
            });

