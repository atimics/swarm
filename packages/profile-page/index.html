<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RATI.chat</title>
  <meta name="description" content="RATI.chat">

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="profile">
  <meta property="og:title" content="RATI.chat">
  <meta property="og:description" content="RATI.chat">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="RATI.chat">
  <meta name="twitter:description" content="RATI.chat">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-card: #1a1a1a;
      --border: #2a2a2a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --accent: #ff6b35;
      --accent-glow: rgba(255, 107, 53, 0.3);
      --success: #22c55e;
      --warning: #eab308;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    .logo span {
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Profile Header */
    .profile-header {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 16px;
      background: var(--bg-card);
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-handle {
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .profile-handle a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .profile-handle a:hover {
      color: var(--accent);
    }

    .tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .tier-badge.tier-3,
    .tier-badge.tier-4,
    .tier-badge.tier-5 {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Burn Stats */
    .burn-total {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .burn-total span {
      color: var(--accent);
    }

    .burn-meta {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .burn-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Progress Bar */
    .progress-container {
      margin-top: 16px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff8c5a);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Energy */
    .energy-display {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }

    .energy-current {
      font-size: 32px;
      font-weight: 700;
    }

    .energy-max {
      font-size: 18px;
      color: var(--text-muted);
    }

    .energy-regen {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Token */
    .token-symbol {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .token-name {
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .token-links {
      display: flex;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--border);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: #ff8c5a;
    }

    /* About */
    .about-text {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }

    /* Links */
    .social-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }

    .social-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Wallet */
    .wallet-address {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
    }

    .wallet-address code {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
    }

    .copy-btn:hover {
      color: var(--accent);
    }

    /* Burn History */
    .burn-history {
      list-style: none;
    }

    .burn-history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .burn-history-item:last-child {
      border-bottom: none;
    }

    .burn-amount {
      font-weight: 600;
    }

    .burn-date {
      font-size: 13px;
      color: var(--text-muted);
    }

    .burn-tx {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .burn-tx a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 0;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 32px;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Loading / Error States */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      padding: 48px 24px;
    }

    .error h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .error p {
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .profile-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .burn-meta {
        flex-wrap: wrap;
        justify-content: center;
      }

      .token-links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="/" class="logo">RATI<span>.chat</span></a>
    </header>

    <main id="app" aria-live="polite"></main>

    <footer id="site-footer" class="footer"></footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
