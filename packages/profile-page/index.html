<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... | RATI</title>
  <meta name="description" content="Avatar profile on RATI">

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="profile">
  <meta property="og:title" content="Avatar Profile | RATI">
  <meta property="og:description" content="View avatar stats, burn tier, and token on RATI">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #141414;
      --bg-card: #1a1a1a;
      --border: #2a2a2a;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --accent: #ff6b35;
      --accent-glow: rgba(255, 107, 53, 0.3);
      --success: #22c55e;
      --warning: #eab308;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    .logo span {
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Profile Header */
    .profile-header {
      display: flex;
      gap: 20px;
      margin-bottom: 32px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 16px;
      background: var(--bg-card);
      object-fit: cover;
      border: 2px solid var(--border);
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-handle {
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .profile-handle a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .profile-handle a:hover {
      color: var(--accent);
    }

    .tier-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .tier-badge.tier-3,
    .tier-badge.tier-4,
    .tier-badge.tier-5 {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Burn Stats */
    .burn-total {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .burn-total span {
      color: var(--accent);
    }

    .burn-meta {
      display: flex;
      gap: 24px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .burn-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Progress Bar */
    .progress-container {
      margin-top: 16px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff8c5a);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Energy */
    .energy-display {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
    }

    .energy-current {
      font-size: 32px;
      font-weight: 700;
    }

    .energy-max {
      font-size: 18px;
      color: var(--text-muted);
    }

    .energy-regen {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Token */
    .token-symbol {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .token-name {
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .token-links {
      display: flex;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn:hover {
      background: var(--border);
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: #ff8c5a;
    }

    /* About */
    .about-text {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.6;
    }

    /* Links */
    .social-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }

    .social-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Wallet */
    .wallet-address {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
    }

    .wallet-address code {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
    }

    .copy-btn:hover {
      color: var(--accent);
    }

    /* Burn History */
    .burn-history {
      list-style: none;
    }

    .burn-history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .burn-history-item:last-child {
      border-bottom: none;
    }

    .burn-amount {
      font-weight: 600;
    }

    .burn-date {
      font-size: 13px;
      color: var(--text-muted);
    }

    .burn-tx {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .burn-tx a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 32px 0;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 32px;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Loading / Error States */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      text-align: center;
      padding: 48px 24px;
    }

    .error h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .error p {
      color: var(--text-secondary);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .profile-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .burn-meta {
        flex-wrap: wrap;
        justify-content: center;
      }

      .token-links {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <a href="/" class="logo">RATI<span>.chat</span></a>
    </header>

    <main id="app">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading profile...</p>
      </div>
    </main>

    <footer class="footer">
      Powered by <a href="https://rati.chat">RATI</a> &bull; All burns are on-chain & verifiable
    </footer>
  </div>

  <script>
    // Get avatar ID from URL
    // Supports: avatar-id.rati.chat OR rati.chat/avatar-id
    function getAvatarId() {
      const hostname = window.location.hostname;
      const pathname = window.location.pathname;

      // Check subdomain first (avatar-id.rati.chat)
      if (hostname.endsWith('.rati.chat')) {
        const subdomain = hostname.replace('.rati.chat', '');
        if (subdomain && subdomain !== 'www') {
          return subdomain;
        }
      }

      // Check path (rati.chat/avatar-id or localhost/avatar-id)
      const pathParts = pathname.split('/').filter(Boolean);
      if (pathParts.length > 0 && pathParts[0] !== 'index.html') {
        return pathParts[0];
      }

      // For local development, check query param
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('avatar');
    }

    // Format number with commas
    function formatNumber(num) {
      return num.toLocaleString();
    }

    // Format date
    function formatDate(timestamp) {
      return new Date(timestamp).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    // Truncate address
    function truncateAddress(address) {
      return `${address.slice(0, 6)}...${address.slice(-4)}`;
    }

    // Copy to clipboard
    async function copyToClipboard(text) {
      await navigator.clipboard.writeText(text);
      // Could add a toast notification here
    }

    // Render profile
    function renderProfile(profile) {
      document.title = `${profile.name} | RATI`;

      const tierClass = `tier-${profile.burnStats.tier}`;

      const app = document.getElementById('app');
      app.innerHTML = `
        <!-- Profile Header -->
        <div class="profile-header">
          ${profile.profileImage
            ? `<img src="${profile.profileImage}" alt="${profile.name}" class="avatar">`
            : `<div class="avatar"></div>`
          }
          <div class="profile-info">
            <h1 class="profile-name">${profile.name}</h1>
            ${profile.links.twitter
              ? `<p class="profile-handle"><a href="${profile.links.twitter}" target="_blank">@${profile.links.twitter.split('/').pop()}</a></p>`
              : ''
            }
            <span class="tier-badge ${tierClass}">
              ${profile.burnStats.tierEmoji} Tier ${profile.burnStats.tier} &bull; ${profile.burnStats.tierName}
            </span>
          </div>
        </div>

        <!-- Burn Stats -->
        <div class="card">
          <div class="card-header">
            <span>🔥</span> BURN STATS
          </div>
          <div class="burn-total">
            <span>${formatNumber(profile.burnStats.totalBurned)}</span> RATI
          </div>
          <div class="burn-meta">
            ${profile.burnStats.rank
              ? `<div class="burn-meta-item">
                  <span>🏆</span> Rank #${profile.burnStats.rank} of ${profile.burnStats.totalAvatars}
                </div>`
              : ''
            }
            <div class="burn-meta-item">
              <span>🔥</span> ${profile.burnStats.burnCount} burns
            </div>
          </div>
          ${profile.burnStats.nextTierAt
            ? `<div class="progress-container">
                <div class="progress-label">
                  <span>Progress to ${profile.burnStats.nextTierName}</span>
                  <span>${profile.burnStats.progressPercent}%</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${profile.burnStats.progressPercent}%"></div>
                </div>
                <div class="progress-label">
                  <span></span>
                  <span>${formatNumber(profile.burnStats.nextTierAt - profile.burnStats.totalBurned)} RATI to go</span>
                </div>
              </div>`
            : `<p style="color: var(--success); margin-top: 8px;">🎉 Max tier reached!</p>`
          }
        </div>

        <!-- Energy -->
        <div class="card">
          <div class="card-header">
            <span>⚡</span> ENERGY
          </div>
          <div class="energy-display">
            <span class="energy-current">${profile.energy.current}</span>
            <span class="energy-max">/ ${profile.energy.max} ⚡</span>
          </div>
          <p class="energy-regen">
            Regenerating at ${profile.energy.regenPerHour}/hour
            ${profile.energy.nextRefillIn > 0 ? ` &bull; Next +1 in ${profile.energy.nextRefillIn}m` : ''}
          </p>
        </div>

        <!-- Token (if launched) -->
        ${profile.token ? `
          <div class="card">
            <div class="card-header">
              <span>🪙</span> TOKEN
            </div>
            <div class="token-symbol">$${profile.token.symbol}</div>
            <div class="token-name">${profile.token.name}</div>
            <div class="token-links">
              <a href="${profile.token.bagsUrl}" target="_blank" class="btn btn-primary">
                Trade on Bags
              </a>
              <a href="https://solscan.io/token/${profile.token.mint}" target="_blank" class="btn">
                View on Solscan
              </a>
            </div>
          </div>
        ` : ''}

        <!-- About -->
        ${profile.description ? `
          <div class="card">
            <div class="card-header">
              <span>📝</span> ABOUT
            </div>
            <p class="about-text">${profile.description}</p>
          </div>
        ` : ''}

        <!-- Links -->
        ${(profile.links.twitter || profile.links.telegram) ? `
          <div class="card">
            <div class="card-header">
              <span>🔗</span> LINKS
            </div>
            <div class="social-links">
              ${profile.links.twitter
                ? `<a href="${profile.links.twitter}" target="_blank" class="social-link">
                    <span>𝕏</span> Twitter
                  </a>`
                : ''
              }
              ${profile.links.telegram
                ? `<a href="${profile.links.telegram}" target="_blank" class="social-link">
                    <span>📱</span> Telegram
                  </a>`
                : ''
              }
            </div>
          </div>
        ` : ''}

        <!-- Wallet -->
        ${profile.wallet ? `
          <div class="card">
            <div class="card-header">
              <span>👛</span> WALLET
            </div>
            <div class="wallet-address">
              <code>${profile.wallet.address}</code>
              <button class="copy-btn" onclick="copyToClipboard('${profile.wallet.address}')" title="Copy address">
                📋
              </button>
              <a href="${profile.wallet.solscanUrl}" target="_blank" class="copy-btn" title="View on Solscan">
                🔗
              </a>
            </div>
          </div>
        ` : ''}

        <!-- Burn History -->
        ${profile.burnHistory.length > 0 ? `
          <div class="card">
            <div class="card-header">
              <span>📜</span> BURN HISTORY
            </div>
            <ul class="burn-history">
              ${profile.burnHistory.map(burn => `
                <li class="burn-history-item">
                  <div>
                    <div class="burn-amount">${formatNumber(burn.amount)} RATI</div>
                    <div class="burn-date">${formatDate(burn.timestamp)}</div>
                  </div>
                  <div class="burn-tx">
                    <a href="${burn.solscanUrl}" target="_blank">
                      ${truncateAddress(burn.signature)}
                    </a>
                  </div>
                </li>
              `).join('')}
            </ul>
          </div>
        ` : ''}
      `;
    }

    // Render error
    function renderError(message) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="error">
          <h2>Profile Not Found</h2>
          <p>${message}</p>
        </div>
      `;
    }

    // Main
    async function main() {
      const avatarId = getAvatarId();

      if (!avatarId) {
        renderError('No avatar specified. Try visiting avatar-id.rati.chat');
        return;
      }

      try {
        // API URL - adjust for your environment
        const apiUrl = window.location.hostname.includes('localhost')
          ? `http://localhost:3001/api/profile/${avatarId}`
          : `https://api.rati.chat/api/profile/${avatarId}`;

        const response = await fetch(apiUrl);

        if (!response.ok) {
          if (response.status === 404) {
            renderError(`Avatar "${avatarId}" not found`);
          } else {
            renderError('Failed to load profile');
          }
          return;
        }

        const profile = await response.json();
        renderProfile(profile);
      } catch (error) {
        console.error('Error loading profile:', error);
        renderError('Failed to connect to server');
      }
    }

    // Run
    main();
  </script>
</body>
</html>
