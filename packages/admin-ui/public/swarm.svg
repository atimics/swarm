<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7a6395;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Central hub -->
  <circle cx="50" cy="50" r="12" fill="url(#grad1)" filter="url(#glow)"/>
  <!-- Orbiting nodes -->
  <circle cx="50" cy="20" r="6" fill="#b8a9c9"/>
  <circle cx="76" cy="35" r="6" fill="#9680ad"/>
  <circle cx="76" cy="65" r="6" fill="#a78bfa"/>
  <circle cx="50" cy="80" r="6" fill="#c084fc"/>
  <circle cx="24" cy="65" r="6" fill="#9680ad"/>
  <circle cx="24" cy="35" r="6" fill="#b8a9c9"/>
  <!-- Connection lines -->
  <path d="M50 32 L50 38" stroke="#b8a9c9" stroke-width="2" opacity="0.5"/>
  <path d="M60 44 L68 38" stroke="#9680ad" stroke-width="2" opacity="0.5"/>
  <path d="M60 56 L68 62" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <path d="M50 62 L50 68" stroke="#c084fc" stroke-width="2" opacity="0.5"/>
  <path d="M40 56 L32 62" stroke="#9680ad" stroke-width="2" opacity="0.5"/>
  <path d="M40 44 L32 38" stroke="#b8a9c9" stroke-width="2" opacity="0.5"/>
</svg>