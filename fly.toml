# Fly.io single-tenant hosted pilot config for the local Swarm container.
# Replace `app` with the Fly app name you create, then set secrets from
# docs/HOSTED-PILOT-FLY.md before deploying.

app = "swarm-rati-pilot"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile.local"
  target = "api"

[env]
  PORT = "3000"
  SWARM_HOST = "0.0.0.0"
  SWARM_DB_PATH = "/data/swarm.db"
  SWARM_BLOB_DIR = "/data/blobs"
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  # Set to your deployed origin for no-token same-origin writes, or leave as-is
  # when using SWARM_LOCAL_API_TOKEN + ?swarmLocalToken=... access.
  SWARM_ALLOWED_ORIGINS = "https://swarm-rati-pilot.fly.dev"

[mounts]
  source = "swarm_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"
