source: engineering-report-2026-02-15

body: |
  ## Problem

  The codebase contains ~299 instances of `as any`, `as unknown`, `as Type`, and `@ts-ignore`
  directives. These bypass TypeScript's type system, hiding potential runtime errors and making
  refactoring unsafe.

  **Hotspots:**

  - `admin-api/src/handlers/chat.ts` — 38 type assertions (heaviest single file)
  - `admin-api/src/services/mcp-adapter.ts` — extensive `as` usage for service wiring
  - `admin-api/src/services/memory.ts` — DynamoDB result casting

  **Common patterns:**

  ```typescript
  // Pattern 1: DynamoDB result casting (unsafe)
  const items = (result.Items || []) as AvatarMemory[];

  // Pattern 2: Loosely typed tool arguments
  const args = toolCall.function.arguments as any;

  // Pattern 3: External API response casting
  const data = response.json() as unknown as TwitterResponse;
  ```

  ## Impact

  - Runtime errors masked at compile time
  - Refactoring tools can't track type flow through `as any`
  - IDE suggestions unreliable in affected files
  - New developers can't trust the type system

  ## Proposal

  1. **Add ESLint rule** — `@typescript-eslint/no-explicit-any: error` (currently `warn`)
  2. **Replace `as Type` with type guards** where possible:

     ```typescript
     // Before
     const items = (result.Items || []) as AvatarMemory[];

     // After
     const items = (result.Items ?? []).map(parseAvatarMemory);

     function parseAvatarMemory(item: Record<string, unknown>): AvatarMemory {
       return AvatarMemorySchema.parse(item);  // Zod validates at runtime
     }
     ```

  3. **Add Zod schemas for external data boundaries** (DynamoDB results, API responses, tool args)
  4. **Triage and fix in priority order**: chat.ts > mcp-adapter.ts > memory.ts > rest

  ## Acceptance Criteria

  - [ ] `as any` count reduced from ~299 to <50
  - [ ] `@typescript-eslint/no-explicit-any` set to `error` (not `warn`)
  - [ ] Zod runtime validation at data boundaries (DynamoDB, external APIs)
  - [ ] Zero `@ts-ignore` directives in production code
