body: |
  ## RFC: DynamoDB Repository Abstraction

  ### Problem

  DynamoDB implementation details — GSI names, key prefixes, sort key formats, and query patterns —
  leak from the data layer into business logic across 20+ service files. Changing the table schema
  (adding a GSI, renaming a key prefix) requires editing every caller.

  **Evidence — GSI names hardcoded in service files:**

  ```typescript
  // packages/admin-api/src/services/avatar-ownership.ts:29,96
  const GSI1_NAME = 'GSI1';
  // ... later:
  IndexName: GSI1_NAME,
  KeyConditionExpression: 'sk = :sk',

  // packages/admin-api/src/services/avatars.ts:375-382
  IndexName: 'GSI1',
  KeyConditionExpression: 'sk = :sk AND begins_with(pk, :pk)',

  // packages/admin-api/src/services/avatar-observability.ts:316,351,603
  IndexName: 'gsi1',  // Note: inconsistent casing!

  // packages/admin-api/src/services/chat-jobs.ts:139,152
  IndexName: 'GSI2',
  // ... with error handling for missing GSI:
  if (!message.includes('specified index: GSI2')) { /* fallback to scan */ }
  ```

  **Evidence — key schema leaked into business logic:**

  ```typescript
  // packages/admin-api/src/services/memory.ts:309-310,381-404
  pk: `MEMORY#${validAvatarId}`,
  sk: `${tier}#${now}#${id}`,
  // ... later:
  KeyConditionExpression: 'pk = :pk AND begins_with(sk, :prefix)',
  ExpressionAttributeValues: {
    ':pk': `MEMORY#${validAvatarId}`,
    ':prefix': `${tier}#`,
  },
  ```

  **Evidence — comments acknowledging the problem:**

  ```typescript
  // packages/admin-api/src/services/auto-issues.ts:292
  // For simplicity, scan with filters. In production, use GSI.

  // packages/admin-api/src/services/wallets.ts:279
  // For all wallets, we'd need a GSI or scan

  // packages/admin-api/src/services/chat-voting.ts:312
  // In production, you'd want a GSI on proposalId
  ```

  **Also: GSI name casing is inconsistent** (`'GSI1'` vs `'gsi1'`) — proving
  there's no single source of truth.

  ### Proposal

  #### 1. Table constants in `@swarm/core`

  ```typescript
  // packages/core/src/db/table-schema.ts
  export const TableSchema = {
    indexes: {
      primary: { pk: 'pk', sk: 'sk' },
      gsi1: { name: 'GSI1', pk: 'sk', sk: 'pk' },  // Inverted index
      gsi2: { name: 'GSI2', pk: 'gsi2pk', sk: 'gsi2sk' },
    },
    keyPrefixes: {
      avatar: 'AVATAR',
      config: 'CONFIG',
      memory: 'MEMORY',
      channel: 'CHANNEL',
      inhabitant: 'INHABITANT',
      session: 'SESSION',
    },
  } as const;
  ```

  #### 2. Repository per entity

  ```typescript
  // packages/admin-api/src/repositories/memory-repository.ts
  export class MemoryRepository {
    constructor(private table: string, private ddb: DynamoDBDocumentClient) {}

    async listByTier(avatarId: string, tier: string, limit?: number): Promise<MemoryRecord[]> {
      const result = await this.ddb.send(new QueryCommand({
        TableName: this.table,
        KeyConditionExpression: 'pk = :pk AND begins_with(sk, :prefix)',
        ExpressionAttributeValues: {
          ':pk': `${TableSchema.keyPrefixes.memory}#${avatarId}`,
          ':prefix': `${tier}#`,
        },
        Limit: limit,
        ScanIndexForward: false,
      }));
      return (result.Items ?? []).map(this.toMemoryRecord);
    }

    async put(avatarId: string, record: MemoryRecord): Promise<void> {
      await this.ddb.send(new PutCommand({
        TableName: this.table,
        Item: {
          pk: `${TableSchema.keyPrefixes.memory}#${avatarId}`,
          sk: `${record.tier}#${record.timestamp}#${record.id}`,
          ...record,
        },
      }));
    }
  }
  ```

  #### 3. Services consume repositories, not DynamoDB directly

  ```typescript
  // packages/admin-api/src/services/memory.ts
  export class MemoryService {
    constructor(private repo: MemoryRepository) {}

    async getRecentMemories(avatarId: string, tier: string): Promise<Memory[]> {
      return this.repo.listByTier(avatarId, tier, 50);
    }
  }
  ```

  The service no longer knows about `pk`, `sk`, GSI names, or DynamoDB query syntax.

  ### Migration Path

  1. Create `TableSchema` constants and `repositories/` directory
  2. Start with `MemoryRepository` (highest-LOC service, most DynamoDB coupling)
  3. Extract `AvatarRepository` and `ChannelRepository`
  4. Gradually migrate remaining services (one PR per entity)
  5. Add repository unit tests with DynamoDB Local or mocks

  ### Acceptance Criteria

  - [ ] `TableSchema` constants as single source of truth for indexes and key prefixes
  - [ ] At least 3 repository classes (memory, avatar, channel)
  - [ ] Zero GSI name strings outside `TableSchema` and repository classes
  - [ ] Zero `pk`/`sk` key construction outside repositories
  - [ ] Services consume repositories via constructor injection
  - [ ] Repository unit tests with mocked DynamoDB
