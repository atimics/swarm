id: "018"
title: "fix(admin-api): idempotency store is in-memory — lost on cold start"
priority: P0
type: bug
labels:
  - type:bug
  - priority:high
  - package:admin
assignees: []
source: engineering-report-2026-02-15

body: |
  ## Problem

  The idempotency store that prevents duplicate message processing uses an **in-memory `Map`**.
  When a Lambda cold start occurs, all idempotency records are lost. Duplicate requests within the
  TTL window (5 min) will be processed again.

  **File:** `packages/admin-api/src/services/idempotency.ts` (lines 12-41)

  ```typescript
  class InMemoryIdempotencyStore<T> {
    private store = new Map<string, IdempotencyRecord<T>>();
    private ttlMs: number;

    constructor(ttlMs = 5 * 60 * 1000) {
      this.ttlMs = ttlMs;
    }

    get(key: string): T | undefined {
      const record = this.store.get(key);
      if (!record) return undefined;
      if (Date.now() - record.timestamp > this.ttlMs) {
        this.store.delete(key);
        return undefined;
      }
      return record.value;
    }
  }
  ```

  This is used by `chatIdempotencyStore` to deduplicate chat processing jobs. In an async SQS
  pipeline where Lambdas regularly cold start, this is effectively a no-op.

  ## Impact

  - Chat messages processed multiple times after cold start
  - Media generation jobs duplicated (costs real money)
  - User sees duplicate responses

  ## Fix

  Replace with DynamoDB-backed idempotency using conditional writes:

  ```typescript
  // DynamoDB item with TTL
  {
    pk: `IDEMPOTENCY#${key}`,
    sk: 'LOCK',
    ttl: Math.floor(Date.now() / 1000) + 300,  // 5 min TTL
    result: JSON.stringify(value),
  }

  // Conditional put — fails if already exists and not expired
  await ddb.send(new PutCommand({
    TableName: ADMIN_TABLE,
    Item: item,
    ConditionExpression: 'attribute_not_exists(pk) OR #ttl < :now',
    ExpressionAttributeNames: { '#ttl': 'ttl' },
    ExpressionAttributeValues: { ':now': Math.floor(Date.now() / 1000) },
  }));
  ```

  Alternatively, use SQS FIFO deduplication if messages already flow through FIFO queues.

  ## Acceptance Criteria

  - [ ] Idempotency records survive Lambda cold starts
  - [ ] DynamoDB TTL auto-cleans expired records
  - [ ] Duplicate SQS messages within 5 min window are rejected
  - [ ] Existing `chatIdempotencyStore` API unchanged (drop-in replacement)
