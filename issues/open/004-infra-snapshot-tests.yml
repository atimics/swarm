body: |
  ## Problem

  `packages/infra/` has **zero test files** for 5,185 lines of CDK infrastructure code. Infrastructure changes are deployed untested — accidental resource deletions or permission changes go undetected.

  ## Proposal

  Add CDK assertion tests using `aws-cdk-lib/assertions`:

  1. **Snapshot tests** — synthesize each stack and snapshot the CloudFormation template
  2. **Fine-grained assertions** — verify critical resources exist (DynamoDB tables, SQS queues, Lambda functions, IAM roles)
  3. **Security assertions** — verify IAM least-privilege, encryption enabled, DLQs attached

  Example:

  ```typescript
  import { Template } from 'aws-cdk-lib/assertions';

  test('SharedInfraStack creates DynamoDB table with encryption', () => {
    const template = Template.fromStack(stack);
    template.hasResourceProperties('AWS::DynamoDB::Table', {
      SSESpecification: { SSEEnabled: true },
    });
  });
  ```

  ## Acceptance Criteria

  - [ ] At least 1 snapshot test per CDK stack (4 stacks)
  - [ ] Fine-grained assertions for critical resources
  - [ ] Tests run in CI alongside other package tests
