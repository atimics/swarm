body: |
  ## Problem

  The CDK infra creates DLQ alarms for 4 queues but no Lambda handler to drain or reprocess them:

  - `swarm-response-dlq`
  - `swarm-chat-dlq`
  - `swarm-dream-dlq`
  - `swarm-consolidation-dlq`

  When messages land in a DLQ, they sit there indefinitely. Recovery requires manual AWS Console
  intervention — identifying the message, understanding the failure, and manually requeueing it.

  **File:** `packages/infra/src/constructs/admin-api.ts` (DLQ alarm definitions)

  ## Impact

  - Failed messages lost after DLQ retention period (14 days default)
  - No automated retry for transient failures
  - Operational burden on developers for every DLQ alarm
  - No visibility into failure patterns

  ## Proposal

  Create a DLQ processor Lambda triggered by SQS on the DLQ:

  ```typescript
  // packages/handlers/src/dlq-processor.ts
  export const handler: SQSHandler = async (event) => {
    for (const record of event.Records) {
      const sourceQueue = record.attributes.DeadLetterQueueSourceArn;
      const failureReason = record.attributes.DeadLetterQueueSourceArn;
      const receiveCount = parseInt(record.attributes.ApproximateReceiveCount);

      logger.error({
        event: 'dlq_message_received',
        sourceQueue,
        receiveCount,
        messageId: record.messageId,
        bodyPreview: record.body.slice(0, 200),
      });

      // Emit CloudWatch metric for DLQ dashboard
      emitMetric('DLQMessageReceived', 1, { SourceQueue: sourceQueue });

      // Strategy:
      // - Transient failures (< 5 receives): requeue to source
      // - Persistent failures: log and archive to S3 for investigation
      if (receiveCount < 5) {
        await requeueToSource(record);
      } else {
        await archiveToS3(record);
      }
    }
  };
  ```

  ## Acceptance Criteria

  - [ ] Lambda handler processes all 4 DLQs
  - [ ] Transient failures (< 5 receives) automatically requeued
  - [ ] Persistent failures archived to S3 with full context
  - [ ] CloudWatch metric emitted per DLQ message
  - [ ] Dashboard widget showing DLQ throughput and failure reasons
