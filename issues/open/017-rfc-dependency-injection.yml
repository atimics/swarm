body: |
  ## RFC: Lightweight Dependency Injection

  ### Problem

  Every handler manually instantiates its own service dependencies. The `createMCPServices()`
  function in `mcp-adapter.ts` imports 30+ service modules and wires them together in 1,100 lines
  of inline adapter code. Changing a service constructor signature requires touching this file plus
  every handler that uses the service directly.

  **Evidence — mcp-adapter.ts imports (lines 15-46):**

  ```typescript
  import * as avatars from '../services/avatars.js';
  import * as secrets from '../services/secrets.js';
  import * as wallets from '../services/wallets.js';
  import * as telegram from '../services/telegram.js';
  import { createTwitterServices } from '../services/mcp-twitter-adapter.js';
  import * as chatVoting from '../services/chat-voting.js';
  import * as discord from '../services/discord.js';
  import * as media from '../services/media.js';
  import * as gallery from '../services/gallery.js';
  import * as credits from '../services/credits.js';
  import * as mediaJobs from '../services/media-jobs.js';
  import * as voice from '../services/voice.js';
  import * as avatarOwnership from '../services/avatar-ownership.js';
  import * as nftGate from '../services/nft-gate.js';
  import * as lineageNft from '../services/lineage-nft.js';
  import * as propertyResearch from '../services/property-research.js';
  import * as stickers from '../services/stickers.js';
  import * as memory from '../services/memory.js';
  // ... 15+ more
  ```

  Services are singleton module-level instances that read `process.env` at import time.
  This makes testing extremely difficult — you can't inject mocks without hoisting module
  mocks for every dependency.

  ### Proposal

  **Not** a heavy IoC framework. A simple typed context object that flows through the call chain.

  #### 1. Service context

  ```typescript
  // packages/admin-api/src/context.ts
  export interface ServiceContext {
    // AWS clients (shared, created once per cold start)
    dynamodb: DynamoDBDocumentClient;
    sqs: SQSClient;
    s3: S3Client;
    secretsManager: SecretsManagerClient;

    // Config (validated at startup)
    config: AdminApiEnv;

    // Per-request context
    request: {
      avatarId: string;
      session: SessionData;
      correlationId: string;
    };
  }
  ```

  #### 2. Services accept context via constructor

  ```typescript
  // Before — module singleton, reads env at import time
  const ADMIN_TABLE = process.env.ADMIN_TABLE!;
  export async function listAvatars() {
    const ddb = getDynamoClient();
    return ddb.send(new QueryCommand({ TableName: ADMIN_TABLE, ... }));
  }

  // After — injectable, testable
  export class AvatarService {
    constructor(private ctx: ServiceContext) {}

    async list(): Promise<Avatar[]> {
      return this.ctx.dynamodb.send(new QueryCommand({
        TableName: this.ctx.config.ADMIN_TABLE,
        ...
      }));
    }
  }
  ```

  #### 3. Lambda handler wiring

  ```typescript
  // packages/admin-api/src/handlers/chat.ts
  export const handler: APIGatewayProxyHandlerV2 = async (event) => {
    const config = getAdminApiEnv();  // Validated at cold start
    const ctx = createServiceContext(config, event);
    const registry = createServiceRegistry(ctx);

    // All services available via registry
    const avatars = await registry.avatar.list();
  };
  ```

  #### 4. Testability

  ```typescript
  // In tests — no module mocking needed
  const ctx = createTestContext({
    dynamodb: mockDynamoDB,
    config: { ADMIN_TABLE: 'test-table', ... },
    request: { avatarId: 'test', session: mockSession },
  });

  const service = new AvatarService(ctx);
  const result = await service.list();
  ```

  ### Relationship to Other RFCs

  - **RFC #011 (Config Validation)**: `ServiceContext.config` is the validated env schema
  - **RFC #014 (Decomposition)**: Domain modules receive `ServiceContext` in their factories
  - **RFC #016 (Repository)**: Repositories receive `ServiceContext.dynamodb` + `ServiceContext.config`

  These RFCs are complementary and can be implemented in any order, but this one ties them together.

  ### Migration Path

  1. Define `ServiceContext` interface
  2. Create `createServiceContext()` factory used in handler entry points
  3. Convert 2-3 leaf services (simplest first) to accept context
  4. Update `createMCPServices()` to pass context to converted services
  5. Gradually convert remaining services (one domain at a time)

  ### Acceptance Criteria

  - [ ] `ServiceContext` interface defined with AWS clients, config, and request context
  - [ ] At least 5 services converted from module singletons to class with context injection
  - [ ] Test helpers that create mock context without module-level mocking
  - [ ] `createMCPServices()` reduced to <200 lines (from 1,100)
  - [ ] No new `process.env` reads outside config modules
