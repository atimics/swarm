body: |
  ## Problem

  Running `pnpm test` produces:

  ```
  401 pass / 114 fail / 66 errors / 59 skip (574 total)
  ```

  The 66 errors are caused by module resolution failures in the Bun test runner:

  | Module | Occurrences |
  |--------|-------------|
  | `@aws-sdk/lib-dynamodb` | 18 |
  | `@swarm/core` | 8 |
  | `zod` | 7 |
  | `@aws-sdk/client-dynamodb` | 4 |
  | `@solana/web3.js` | 2 |
  | `twitter-api-v2` | 2 |
  | Others (grammy, yaml, bs58, jimp, tweetnacl, zustand, react) | 10+ |

  ## Root Cause

  Bun cannot resolve workspace dependencies (`@swarm/core`) or third-party packages installed via `pnpm`. This may be a hoisting or symlink issue between pnpm workspaces and Bun's module resolver.

  ## Fix

  1. Ensure `pnpm install --frozen-lockfile` runs before tests
  2. Verify Bun can resolve pnpm workspace protocol links
  3. Triage the 114 genuine test failures — fix or skip with comments
  4. Consider adding a CI pre-test step that validates module resolution

  ## Acceptance Criteria

  - [ ] `pnpm test` has 0 errors (module resolution resolved)
  - [ ] Test failures reduced to <10 (known issues documented)
  - [ ] CI runs tests reliably
