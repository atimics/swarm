id: "020"
title: "fix(admin-api): Promise.all without timeout protection causes cascading hangs"
priority: P1
type: bug
labels:
  - type:bug
  - priority:high
  - package:admin
assignees: []
source: engineering-report-2026-02-15

body: |
  ## Problem

  Multiple `Promise.all()` calls in the memory service fire parallel DynamoDB queries without
  any timeout. If one query hangs (network partition, DynamoDB throttling), the entire request
  blocks until the Lambda times out at 60s+, giving the user no response at all.

  **File:** `packages/admin-api/src/services/memory.ts` (lines 383, 667, 745, 786)

  ```typescript
  // Lines 383+: Parallel tier queries — if any one hangs, all hang
  const [immediateResult, recentResult, coreResult] = await Promise.all([
    ddb.send(new QueryCommand({ /* immediate tier */ })),
    ddb.send(new QueryCommand({ /* recent tier */ })),
    ddb.send(new QueryCommand({ /* core tier */ })),
  ]);
  ```

  This pattern repeats in 4+ locations in the memory service and likely elsewhere.

  ## Impact

  - Single slow DynamoDB query blocks entire request
  - User sees timeout instead of partial results
  - Lambda pays for full timeout duration
  - Cascading failures if DynamoDB is throttled

  ## Fix

  Add a timeout wrapper for parallel operations:

  ```typescript
  function withTimeout<T>(promise: Promise<T>, ms: number, label: string): Promise<T> {
    return Promise.race([
      promise,
      new Promise<never>((_, reject) =>
        setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms)
      ),
    ]);
  }

  // Usage:
  const [immediate, recent, core] = await Promise.allSettled([
    withTimeout(queryImmediate(), 5000, 'immediate-tier'),
    withTimeout(queryRecent(), 5000, 'recent-tier'),
    withTimeout(queryCore(), 5000, 'core-tier'),
  ]);

  // Return partial results from fulfilled promises
  ```

  Use `Promise.allSettled` + timeout so partial results are returned even if one tier fails.

  ## Acceptance Criteria

  - [ ] All parallel DynamoDB queries wrapped with 5s timeout
  - [ ] Use `Promise.allSettled` to return partial results on partial failure
  - [ ] Structured log emitted when individual query times out
  - [ ] User gets a response even if one memory tier is slow
