body: |
  ## Problem

  `packages/handlers/src/` contains 24 TypeScript files at the root level with no directory
  structure. Handlers, processors, senders, and integration-specific logic are mixed together:

  ```
  src/
    autonomous-tweet-poster.ts
    claude-code-callback.ts
    continuation-processor.ts
    discord-gateway-shared.ts
    llm-client.ts
    media-processor.ts
    message-processor.ts
    moltbook-heartbeat.ts
    response-sender.ts
    tweet-sender.ts
    twitter-mention-poller-shared.ts
    ... (13+ more)
  ```

  ## Impact

  - Difficult to find specific handler logic
  - No clear separation between webhooks, async processors, and senders
  - New developers can't tell which files are Lambda entry points vs shared libraries
  - Mirrors the admin-api flat structure problem (RFC #014)

  ## Proposal

  ```
  src/
    webhooks/               # Lambda entry points for external webhooks
      telegram.ts
      twitter.ts
      discord.ts

    processors/             # SQS-triggered async processors
      message-processor.ts
      media-processor.ts
      continuation-processor.ts

    senders/                # Outbound message delivery
      response-sender.ts
      tweet-sender.ts
      autonomous-tweet-poster.ts

    integrations/           # Platform-specific shared logic
      discord-gateway-shared.ts
      twitter-mention-poller-shared.ts

    lib/                    # Shared utilities
      llm-client.ts
      secrets-cache.ts

    index.ts                # Barrel exports
  ```

  ## Migration Path

  1. Create directory structure
  2. Move files (one directory at a time)
  3. Update imports in each moved file
  4. Update CDK Lambda handler paths in `packages/infra/src/constructs/shared-handlers.ts`
  5. Verify all Lambda functions deploy correctly

  ## Acceptance Criteria

  - [ ] All handler files organized into domain directories
  - [ ] No more than 8 files at the `src/` root level
  - [ ] CDK handler paths updated and tested
  - [ ] All existing tests pass
  - [ ] `index.ts` barrel exports maintain backward compatibility
