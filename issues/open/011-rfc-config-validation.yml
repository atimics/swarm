body: |
  ## RFC: Centralized Config Validation

  ### Problem

  147 files read `process.env` directly with no centralized validation. Env vars are parsed inline
  deep in business logic, using non-null assertions (`!`) or silent fallbacks. A missing env var
  doesn't fail at cold start — it fails at runtime when a user happens to hit that code path.

  **Evidence:**

  ```typescript
  // packages/handlers/src/continuation-processor.ts:34-35
  const ADMIN_TABLE = process.env.ADMIN_TABLE!;  // crashes at runtime if missing
  const MESSAGE_QUEUE_URL = process.env.MESSAGE_QUEUE_URL;  // silently undefined

  // packages/admin-api/src/services/voice.ts:24-38
  const ADMIN_TABLE = process.env.ADMIN_TABLE!;
  const MEDIA_BUCKET = process.env.MEDIA_BUCKET!;
  const CDN_URL = process.env.CDN_URL;
  const DEFAULT_STABLE_AUDIO_MODEL = process.env.STABLE_AUDIO_MODEL || DEFAULT_MODELS.audio_generation;

  // packages/admin-api/src/services/memory-consolidation.ts:31-32
  const LLM_API_KEY = process.env.OPENROUTER_API_KEY || process.env.LLM_API_KEY;
  const LLM_MODEL = process.env.CONSOLIDATION_MODEL || 'anthropic/claude-3-5-haiku-latest';

  // packages/admin-api/src/handlers/chat.ts:104-108
  function parseIntEnv(name: string, fallback: number) {  // local helper, not shared
    const v = process.env[name];
    return v ? parseInt(v, 10) : fallback;
  }
  ```

  Zod schemas already exist in `packages/core/src/utils/config.ts` for YAML avatar configs, but the
  env var path (lines 292-352) has **no validation schema** — it's a separate `loadAvatarConfigFromEnv()`
  that reads 15+ vars with inline `parseInt`/`parseFloat` and silent defaults.

  ### Proposal

  Create a `packages/core/src/config/` module with:

  1. **Per-package env schemas** validated at cold start:

     ```typescript
     // packages/core/src/config/handlers.ts
     import { z } from 'zod';

     export const HandlerEnvSchema = z.object({
       ADMIN_TABLE: z.string().min(1),
       STATE_TABLE: z.string().min(1),
       MESSAGE_QUEUE_URL: z.string().url(),
       RESPONSE_QUEUE_URL: z.string().url(),
       MEDIA_BUCKET: z.string().min(1),
       SECRETS_ARN: z.string().startsWith('arn:aws:secretsmanager:'),
     });

     export type HandlerEnv = z.infer<typeof HandlerEnvSchema>;

     let _env: HandlerEnv | null = null;
     export function getHandlerEnv(): HandlerEnv {
       if (!_env) {
         _env = HandlerEnvSchema.parse(process.env);
       }
       return _env;
     }
     ```

  2. **Fail-fast initialization** — call `getHandlerEnv()` at the top of every Lambda handler.
     Missing/invalid vars crash immediately with a clear error listing all failures.

  3. **Typed access everywhere** — replace all `process.env.X!` with `getHandlerEnv().X`.

  4. **CDK cross-reference** — generate the schema from CDK environment definitions so they can't
     drift apart.

  ### Migration Path

  1. Create schemas for the 4 main packages (handlers, admin-api, core, mcp-server)
  2. Add `validateEnv()` calls at Lambda handler entry points
  3. Replace `process.env` reads one package at a time (start with handlers — smallest surface)
  4. Add CI check: `grep -r 'process\.env\.' packages/*/src/ | grep -v config/` should return 0

  ### Acceptance Criteria

  - [ ] Zod schemas for all required env vars per package
  - [ ] Lambda handlers fail at cold start on missing config, not at runtime
  - [ ] Zero direct `process.env` reads outside config modules
  - [ ] CI lint rule preventing new `process.env` usage in business logic
