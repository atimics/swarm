body: |
  ## RFC: End-to-End Observability

  ### Problem

  The system processes messages through a multi-hop async pipeline (webhook → SQS → processor →
  SQS → sender) but has no way to trace a single message through the full flow. When a user's
  message takes 30 seconds or silently drops, there's no tooling to diagnose whether the bottleneck
  was the LLM, DynamoDB, Secrets Manager, SQS, or application code.

  **Current state:**

  | Capability | Status |
  |-----------|--------|
  | Structured logging | Partial — `core/utils/logger.ts` has context fields but propagation is incomplete |
  | X-Ray tracing | CDK enables `Tracing.ACTIVE` on Lambdas, but no X-Ray SDK instrumentation in app code |
  | Custom metrics | Zero — no `PutMetricData` calls anywhere |
  | Correlation IDs | Interface defined in logger, `extractCorrelationIdFromSqsRecord` exists but unused |
  | CloudWatch dashboard | `ops-dashboard.ts` exists but only shows built-in AWS metrics |
  | Alerting | Basic Lambda error alarms only |

  **Evidence:**

  ```typescript
  // packages/core/src/utils/logger.ts:6-15 — fields defined but not propagated
  interface LogContext {
    avatarId?: string;
    platform?: string;
    conversationId?: string;
    messageId?: string;
    requestId?: string;
    correlationId?: string;
    traceId?: string;
  }

  // packages/handlers/src/continuation-processor.ts:18 — imported but unused
  import { logger, extractCorrelationIdFromSqsRecord } from '@swarm/core';
  ```

  ### Proposal

  #### Phase 1: Correlation ID propagation (1-2 days)

  Add a `correlationId` to every message at webhook ingestion that flows through the entire pipeline:

  ```
  Telegram webhook → correlationId generated
    → SQS message attribute: correlationId
      → Processor reads correlationId from SQS, sets in logger context
        → Response SQS message attribute: correlationId
          → Sender reads correlationId, logs with it
  ```

  Every log line from a single user message shares one ID.

  #### Phase 2: Custom CloudWatch metrics (2-3 days)

  Emit key business metrics via CloudWatch Embedded Metric Format (EMF):

  ```typescript
  // No SDK needed — just structured JSON to stdout
  console.log(JSON.stringify({
    _aws: { Timestamp: Date.now(), CloudWatchMetrics: [{
      Namespace: 'Swarm',
      Dimensions: [['AvatarId', 'Platform']],
      Metrics: [
        { Name: 'MessageProcessed', Unit: 'Count' },
        { Name: 'LLMLatencyMs', Unit: 'Milliseconds' },
        { Name: 'TokensUsed', Unit: 'Count' },
      ],
    }]},
    AvatarId: avatarId,
    Platform: 'telegram',
    MessageProcessed: 1,
    LLMLatencyMs: 1234,
    TokensUsed: 500,
  }));
  ```

  **Key metrics to emit:**

  | Metric | Where | Dimensions |
  |--------|-------|------------|
  | `MessageIngested` | Webhook handlers | AvatarId, Platform |
  | `MessageProcessed` | Continuation processor | AvatarId, Platform |
  | `ResponseSent` | Response sender | AvatarId, Platform |
  | `LLMLatencyMs` | LLM client | AvatarId, Model |
  | `LLMTokensUsed` | LLM client | AvatarId, Model |
  | `LLMError` | LLM client | AvatarId, ErrorType |
  | `ToolExecuted` | Tool registry | AvatarId, ToolName |
  | `MediaJobQueued` | Media service | AvatarId, MediaType |
  | `DLQMessage` | DLQ processor | QueueName |
  | `CircuitBreakerTripped` | Circuit breaker | AvatarId, Service |

  #### Phase 3: Enhanced dashboard (1 day)

  Update `ops-dashboard.ts` to include:

  - Message pipeline funnel: ingested → processed → sent (with drop-off %)
  - P50/P95/P99 LLM latency per avatar
  - Token consumption by avatar and model
  - Tool execution frequency heatmap
  - Error rate by type and avatar
  - DLQ depth with alarm

  #### Phase 4: X-Ray instrumentation (optional, 2-3 days)

  Add X-Ray SDK to trace cross-service calls:

  ```typescript
  import AWSXRay from 'aws-xray-sdk-core';
  const dynamodb = AWSXRay.captureAWSv3Client(new DynamoDBClient({}));
  ```

  This gives per-request flame graphs showing time spent in DynamoDB, SQS, Secrets Manager, and
  external LLM APIs.

  ### Acceptance Criteria

  - [ ] Every message has a `correlationId` from ingestion to response
  - [ ] At least 5 custom CloudWatch metrics emitted via EMF
  - [ ] Dashboard shows message pipeline funnel and LLM latency percentiles
  - [ ] Alarm fires when DLQ depth > 0 or error rate > 5%
  - [ ] Can trace a single user message through all log groups using correlationId
