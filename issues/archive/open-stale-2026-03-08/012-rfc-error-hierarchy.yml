body: |
  ## RFC: Typed Error Hierarchy

  ### Problem

  The entire codebase has **1 custom error class** (`AuthError` in `admin-api/src/auth/errors.ts`, 16 lines).
  Everything else throws raw `Error` objects with string messages that are parsed with regex downstream.

  **Evidence — backend error creation:**

  ```typescript
  // packages/handlers/src/media-processor.ts:435
  throw new Error('Video generation is not configured for this avatar');

  // packages/handlers/src/llm-client.ts:218,229,281
  throw new Error('OPENROUTER_API_KEY not found in secrets');
  throw new Error('LLM circuit breaker is open — provider unhealthy');
  throw new Error(`LLM API error: ${response.status} ${retryText.slice(0, 200)}`);
  ```

  **Evidence — backend regex error parsing:**

  ```typescript
  // packages/admin-api/src/handlers/chat-error-mapping.ts:4-10
  const match = message.match(/OpenRouter API error:\s*(\d{3})\b/);

  // Lines 12-26: isTimeoutLikeError()
  if (lowered.includes('timeout') || lowered.includes('timed out')) return true;
  if (lowered.includes('aborted') && lowered.includes('timeout')) return true;

  // Line 51: circuit breaker detection
  /circuit breaker open/i.test(errorMessage)
  ```

  **Evidence — frontend regex error parsing:**

  ```typescript
  // packages/admin-ui/src/auth/wallet-errors.ts:13-36
  return message === 'Failed to fetch' || /networkerror|load failed/i.test(message);
  /extension context invalidated/i.test(message)
  /user rejected|rejected|declined|cancell?ed/i.test(message)
  ```

  When a new error message is worded differently, the regex silently fails to match and the user
  gets a generic "Internal server error".

  ### Proposal

  #### 1. Error base class in `@swarm/core`

  ```typescript
  // packages/core/src/errors.ts
  export enum ErrorCode {
    // Config
    MISSING_CONFIG = 'MISSING_CONFIG',
    INVALID_CONFIG = 'INVALID_CONFIG',

    // Auth
    UNAUTHORIZED = 'UNAUTHORIZED',
    FORBIDDEN = 'FORBIDDEN',
    SESSION_EXPIRED = 'SESSION_EXPIRED',

    // LLM
    LLM_PROVIDER_ERROR = 'LLM_PROVIDER_ERROR',
    LLM_TIMEOUT = 'LLM_TIMEOUT',
    LLM_CIRCUIT_OPEN = 'LLM_CIRCUIT_OPEN',
    LLM_RATE_LIMITED = 'LLM_RATE_LIMITED',

    // Media
    MEDIA_NOT_CONFIGURED = 'MEDIA_NOT_CONFIGURED',
    MEDIA_GENERATION_FAILED = 'MEDIA_GENERATION_FAILED',

    // Platform
    PLATFORM_ERROR = 'PLATFORM_ERROR',
    WEBHOOK_VALIDATION_FAILED = 'WEBHOOK_VALIDATION_FAILED',

    // General
    NOT_FOUND = 'NOT_FOUND',
    VALIDATION_ERROR = 'VALIDATION_ERROR',
    INTERNAL_ERROR = 'INTERNAL_ERROR',
  }

  export class SwarmError extends Error {
    readonly code: ErrorCode;
    readonly statusCode: number;
    readonly details?: Record<string, unknown>;
    readonly retryable: boolean;

    constructor(opts: {
      code: ErrorCode;
      message: string;
      statusCode?: number;
      details?: Record<string, unknown>;
      retryable?: boolean;
      cause?: Error;
    }) {
      super(opts.message, { cause: opts.cause });
      this.code = opts.code;
      this.statusCode = opts.statusCode ?? 500;
      this.details = opts.details;
      this.retryable = opts.retryable ?? false;
    }
  }
  ```

  #### 2. Typed subclasses for domains

  ```typescript
  export class LLMError extends SwarmError { /* code always LLM_* */ }
  export class MediaError extends SwarmError { /* code always MEDIA_* */ }
  export class ConfigError extends SwarmError { /* code always *_CONFIG */ }
  ```

  #### 3. Structured error response contract

  ```typescript
  // API response shape
  interface ErrorResponse {
    error: {
      code: ErrorCode;
      message: string;        // user-safe message
      retryable: boolean;
      requestId?: string;     // for support debugging
    };
  }
  ```

  #### 4. Replace `chat-error-mapping.ts` with `instanceof` checks

  ```typescript
  // Before
  if (/circuit breaker open/i.test(errorMessage)) { statusCode = 503; }

  // After
  if (error instanceof LLMError && error.code === ErrorCode.LLM_CIRCUIT_OPEN) {
    return { statusCode: 503, body: error.toResponse() };
  }
  ```

  ### Migration Path

  1. Add `SwarmError` + `ErrorCode` enum to `@swarm/core`
  2. Replace `AuthError` in admin-api with `SwarmError` subclass
  3. Convert `chat-error-mapping.ts` regex checks to `instanceof`
  4. Replace `throw new Error(...)` in handlers with typed errors (one package at a time)
  5. Update admin-ui `wallet-errors.ts` to check `error.code` instead of regex
  6. Add middleware that catches `SwarmError` and returns structured JSON

  ### Acceptance Criteria

  - [ ] `SwarmError` base class with `ErrorCode` enum in `@swarm/core`
  - [ ] All API error responses use structured `{ error: { code, message, retryable } }` shape
  - [ ] Zero regex-based error classification in backend code
  - [ ] Frontend checks `error.code` instead of parsing `error.message`
  - [ ] `chat-error-mapping.ts` eliminated or reduced to <10 lines
