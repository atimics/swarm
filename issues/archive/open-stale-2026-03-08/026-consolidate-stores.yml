body: |
  ## Problem

  The admin-ui has 8 Zustand stores (840 LOC total) with overlapping concerns:

  ```
  packages/admin-ui/src/store/
    auth.ts          # Session-based auth state
    privyAuth.ts     # Privy wallet auth state
    walletUi.ts      # Wallet UI state
    avatars.ts       # Avatar selection state
    consent.ts       # User consent tracking
    gateStatus.ts    # NFT gate status
    theme.ts         # Theme preferences
  ```

  `auth.ts` and `privyAuth.ts` both manage authentication state. `walletUi.ts` and `gateStatus.ts`
  both track wallet-related state. Stores reference each other implicitly through shared selectors
  in components.

  ## Impact

  - Race conditions between auth stores during login flow
  - Duplicate state (user identity in both auth and privyAuth)
  - Unclear which store to check for "is authenticated?"
  - Hard to add new auth methods without touching multiple stores

  ## Proposal

  Consolidate into 4 stores with clear boundaries:

  ```
  store/
    auth.ts          # Unified: session + Privy + wallet + gate status
    avatars.ts       # Avatar selection and management
    ui.ts            # Theme + consent + UI preferences
    chat.ts          # Chat-specific state (if needed)
  ```

  ## Acceptance Criteria

  - [ ] Auth-related stores consolidated into single `auth.ts`
  - [ ] No duplicate state across stores
  - [ ] Clear `useAuth()` hook returns unified auth status
  - [ ] All login/logout flows work identically
  - [ ] Store count reduced from 8 to 4 or fewer
