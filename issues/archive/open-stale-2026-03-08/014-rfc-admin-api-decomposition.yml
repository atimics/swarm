body: |
  ## RFC: Admin-API Service Decomposition

  ### Problem

  `packages/admin-api/src/services/` contains **103 files totaling 45,927 LOC**. This is a monolith
  hiding inside a monorepo. Every feature (memory, media, wallets, Telegram admin, Twitter OAuth,
  onboarding, NFT gating, voice, property research) lives in one flat directory with implicit
  coupling through shared DynamoDB tables and env vars.

  **Top services by LOC:**

  | Service | LOC | Domain |
  |---------|-----|--------|
  | memory.ts | 2,211 | State |
  | media.ts | 1,469 | Media |
  | mcp-adapter.ts | 1,385 | Tool routing |
  | avatars.ts | 1,168 | Entity management |
  | token-launch.ts | 1,167 | Features |
  | activation-readiness.ts | 1,118 | Deployment |
  | channel-state.ts | 1,102 | State |
  | voice.ts | 1,056 | Media |
  | avatar-ascend.ts | 1,013 | Features |
  | avatar-ownership.ts | 856 | Entity management |
  | energy.ts | 830 | Billing |

  The `createMCPServices()` function in `mcp-adapter.ts` manually wires **30+ service modules**
  with inline adapter functions spanning ~1,100 lines. Changing a service constructor signature
  requires editing this 1,385-line file.

  ### Proposal

  Group services into domain modules within admin-api. This is **not** a microservices split —
  it's organizing the flat directory into cohesive modules with explicit interfaces.

  ```
  packages/admin-api/src/services/
    avatar/                    # Avatar lifecycle
      index.ts                 # Public API barrel
      avatars.ts               # CRUD
      avatar-ownership.ts      # Ownership transfer
      avatar-ascend.ts         # Ascension flow
      avatar-stats.ts          # Analytics
      activation-readiness.ts  # Deployment checks

    media/                     # Media generation & storage
      index.ts
      media.ts                 # Image/video generation
      voice.ts                 # TTS, audio
      gallery.ts               # Gallery management
      media-jobs.ts            # Async job tracking
      stickers.ts              # Sticker packs

    memory/                    # State & context
      index.ts
      memory.ts                # Core memory CRUD
      memory-consolidation.ts  # Background consolidation
      channel-state.ts         # Platform channel state
      chat-history.ts          # Conversation history

    access/                    # Auth, billing, entitlements
      index.ts
      nft-gate.ts              # NFT-based access control
      entitlements.ts          # Feature entitlements
      energy.ts                # Energy/credits system
      active-user-limit.ts     # Concurrency limits

    integrations/              # Platform connectors
      index.ts
      telegram.ts              # Telegram admin operations
      discord.ts               # Discord management
      twitter-oauth.ts         # Twitter OAuth flow
      integrations.ts          # Generic integration helpers

    tools/                     # MCP tool routing
      index.ts
      mcp-adapter.ts           # Service → tool bridge
      tool-context.ts          # Tool selection context
  ```

  #### Service registry instead of manual wiring

  Replace the 1,100-line `createMCPServices()` with a typed service registry:

  ```typescript
  // packages/admin-api/src/services/registry.ts
  export interface ServiceRegistry {
    avatar: AvatarServices;
    media: MediaServices;
    memory: MemoryServices;
    access: AccessServices;
    integrations: IntegrationServices;
  }

  export function createServiceRegistry(ctx: ServiceContext): ServiceRegistry {
    return {
      avatar: createAvatarServices(ctx),
      media: createMediaServices(ctx),
      memory: createMemoryServices(ctx),
      access: createAccessServices(ctx),
      integrations: createIntegrationServices(ctx),
    };
  }
  ```

  Each domain module owns its factory function and public interface. The MCP adapter consumes
  the registry, not 30 individual imports.

  ### Migration Path

  1. Create directory structure with `index.ts` barrels — no code changes, just `mv`
  2. Update imports in `mcp-adapter.ts` and `chat.ts` to use barrel imports
  3. Extract `createMCPServices()` into per-domain factories
  4. Add domain-level interfaces (`AvatarServices`, `MediaServices`, etc.)
  5. Wire registry in `chat.ts` handler

  Each step is independently mergeable. No functional changes — pure reorganization.

  ### Acceptance Criteria

  - [ ] Services grouped into 6 domain directories with barrel exports
  - [ ] `createMCPServices()` replaced by `createServiceRegistry()` (<100 lines)
  - [ ] No service file >1,500 LOC (currently 2,211 max)
  - [ ] All existing tests pass without modification
  - [ ] No circular dependencies between domain modules
