assignees: []
source: engineering-report-2026-02-15

body: |
  ## Problem

  The monorepo has 10 packages with cross-dependencies but no tooling to detect circular imports.
  As packages grow (especially admin-api at 46K LOC), circular dependencies become increasingly
  likely and cause subtle initialization order bugs.

  ## Proposal

  Add `eslint-plugin-import` with the `no-cycle` rule:

  ```javascript
  // eslint.config.js
  import importPlugin from 'eslint-plugin-import';

  export default [
    {
      plugins: { import: importPlugin },
      rules: {
        'import/no-cycle': ['error', { maxDepth: 3 }],
      },
    },
  ];
  ```

  Also consider `madge` for workspace-level circular dependency detection:

  ```bash
  # In CI
  npx madge --circular --extensions ts packages/*/src/
  ```

  ## Acceptance Criteria

  - [ ] `import/no-cycle` ESLint rule enabled
  - [ ] CI fails on circular dependencies
  - [ ] Any existing cycles identified and resolved
  - [ ] Package dependency graph documented
