id: "023"
title: "feat(admin-api): add SSE streaming for chat responses"
priority: P2
type: feature
labels:
  - type:feature
  - priority:medium
  - package:admin
assignees: []
source: engineering-report-2026-02-15

body: |
  ## Problem

  The chat handler collects all LLM tokens before returning a response. For complex queries that
  take 30-60 seconds, the user sees nothing until the full response is ready. There is no way to
  cancel in-flight requests or show partial results.

  **File:** `packages/admin-api/src/handlers/chat.ts` (1,661 lines)

  The handler already has `prefersAsyncResponse()` for background job dispatch, but no streaming
  path for real-time token delivery.

  ## Impact

  - High perceived latency for users
  - No partial results during complex multi-tool queries
  - Users can't cancel bad requests mid-flight
  - Inferior UX compared to ChatGPT, Claude.ai which all stream

  ## Proposal

  Add a Server-Sent Events (SSE) endpoint:

  ```typescript
  // New endpoint: POST /chat/stream
  // Response: text/event-stream

  // Token events
  data: {"type":"token","content":"Hello"}
  data: {"type":"token","content":" world"}

  // Tool call events
  data: {"type":"tool_call","name":"generate_image","status":"started"}
  data: {"type":"tool_call","name":"generate_image","status":"completed","result":{...}}

  // Done event
  data: {"type":"done","usage":{"tokens":150}}
  ```

  **Frontend changes:**

  ```typescript
  // packages/admin-ui/src/api/chat.ts
  const eventSource = new EventSource('/chat/stream', { method: 'POST', body });
  eventSource.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type === 'token') appendToken(data.content);
    if (data.type === 'tool_call') updateToolStatus(data);
    if (data.type === 'done') finalize(data.usage);
  };
  ```

  **Infrastructure:** API Gateway HTTP APIs support streaming responses via Lambda response
  streaming (`InvokeMode: RESPONSE_STREAM`). This requires Lambda function URL or API Gateway
  v2 with chunked transfer encoding.

  ## Acceptance Criteria

  - [ ] SSE endpoint streams tokens as they arrive from LLM
  - [ ] Tool call start/complete events streamed
  - [ ] Frontend renders tokens incrementally
  - [ ] Graceful fallback to non-streaming for older clients
  - [ ] User can cancel in-flight requests
