id: "019"
title: "fix(admin-api): DynamoDB batch writes ignore UnprocessedItems"
priority: P1
type: bug
labels:
  - type:bug
  - priority:high
  - package:admin
assignees: []
source: engineering-report-2026-02-15

body: |
  ## Problem

  Batch write operations in the memory service chunk items into groups of 25 but never check
  the `UnprocessedItems` field in the response. DynamoDB batch writes can partially fail under
  throttling or transient errors — unprocessed items are silently dropped.

  **File:** `packages/admin-api/src/services/memory.ts` (lines 647, 931, 1714, 1873, 2063)

  ```typescript
  for (let i = 0; i < sks.length; i += 25) {
    const chunk = sks.slice(i, i + 25);
    await ddb.send(new BatchWriteCommand({
      RequestItems: {
        [TABLE_NAME]: chunk.map(sk => ({
          DeleteRequest: { Key: { pk, sk } },
        })),
      },
    }));
    // ⚠️ No check for response.UnprocessedItems
  }
  ```

  This pattern appears in at least 5 locations in `memory.ts` for both writes and deletes.

  ## Impact

  - Memory records partially written or deleted under load
  - Data inconsistency between tiers (immediate vs core vs recent)
  - Silent data loss — no logs, no metrics, no alerts

  ## Fix

  Wrap batch operations with retry logic:

  ```typescript
  async function batchWriteWithRetry(
    ddb: DynamoDBDocumentClient,
    params: BatchWriteCommandInput,
    maxRetries = 3,
  ): Promise<void> {
    let unprocessed = params.RequestItems;
    for (let attempt = 0; attempt < maxRetries && unprocessed; attempt++) {
      const result = await ddb.send(new BatchWriteCommand({ RequestItems: unprocessed }));
      unprocessed = result.UnprocessedItems;
      if (unprocessed && Object.keys(unprocessed).length > 0) {
        await new Promise(r => setTimeout(r, 2 ** attempt * 100)); // Exponential backoff
      } else {
        return;
      }
    }
    if (unprocessed && Object.keys(unprocessed).length > 0) {
      logger.error({ event: 'batch_write_partial_failure', count: Object.values(unprocessed).flat().length });
      throw new Error(`Batch write failed: ${Object.values(unprocessed).flat().length} items unprocessed`);
    }
  }
  ```

  ## Acceptance Criteria

  - [ ] All `BatchWriteCommand` calls check `UnprocessedItems`
  - [ ] Exponential backoff retry for unprocessed items (max 3 retries)
  - [ ] Structured log emitted on partial failure
  - [ ] Helper function shared across all batch operations
