id: "025"
title: "fix(admin-api): memory service over-fetches 3x from DynamoDB then slices"
priority: P2
type: bug
labels:
  - type:bug
  - priority:medium
  - package:admin
assignees: []
source: engineering-report-2026-02-15

body: |
  ## Problem

  The memory service intentionally over-fetches 3x the requested items from DynamoDB, filters
  in application code, then slices to the requested limit. This wastes DynamoDB read capacity
  units and scales poorly as data grows.

  **File:** `packages/admin-api/src/services/memory.ts` (line 712)

  ```typescript
  Limit: safeLimit * 3,  // Over-fetch by 3x to account for filtering
  // ... later:
  return ((result.Items || []) as AvatarMemory[]).slice(0, safeLimit);
  ```

  This pattern repeats across memory tier queries.

  ## Impact

  - 3x more DynamoDB RCU consumption than necessary
  - Higher latency from scanning extra items
  - Cost scales linearly with over-fetch ratio
  - At 1000 queries/min, that's 2000 wasted queries/min

  ## Fix

  Use DynamoDB `FilterExpression` to push filtering to the server:

  ```typescript
  // Before: fetch 3x, filter in app
  Limit: safeLimit * 3,
  // ... slice(0, safeLimit)

  // After: filter at DynamoDB, fetch exact count
  Limit: safeLimit,
  FilterExpression: '#status <> :archived',
  ExpressionAttributeNames: { '#status': 'status' },
  ExpressionAttributeValues: { ':archived': 'archived' },
  ```

  If filters are complex, use a sparse GSI that only indexes non-archived records.

  ## Acceptance Criteria

  - [ ] Over-fetch multiplier removed from all memory queries
  - [ ] Filtering pushed to DynamoDB via FilterExpression
  - [ ] RCU consumption reduced (measure before/after with CloudWatch)
  - [ ] Query results unchanged (same records, same order)
