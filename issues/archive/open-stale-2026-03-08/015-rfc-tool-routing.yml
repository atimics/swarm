body: |
  ## RFC: Registry-Driven Tool Dispatch

  ### Problem

  Tool execution in `chat.ts` uses a series of `if/else if` branches matching on tool name strings,
  with hardcoded maps for secret-to-integration normalization. Adding a new tool requires editing
  3+ locations in a 1,100-line function.

  **Evidence — chat.ts lines 620-750:**

  ```typescript
  // Tool name string matching
  if (toolName === 'request_model_selection') {
    // ... build payload
  } else if (toolName === 'request_feature_toggle') {
    // ... build payload
  } else if (toolName === 'request_secret') {
    // ... normalize to configure_integration
  } else if (toolName === 'request_twitter_connection' || toolName === 'twitter_request_integration') {
    // ... normalize
  } else if (toolName === 'get_profile_upload_url' || ...) {
    pendingArgs = await executeUiTool(toolName, pendingArgs, tools);
  }

  // Hardcoded secret type mapping
  const secretTypeToIntegration: Record<string, string> = {
    telegram_bot_token: 'telegram',
    telegram_webhook_secret: 'telegram',
    twitter_api_key: 'twitter',
    // ... 8+ more mappings
  };

  // Media job detection by tool name
  if (toolName === 'generate_image' || toolName === 'generate_video' || toolName === 'generate_sticker') {
    pendingJobs.push({
      type: toolName === 'generate_video' ? 'video' : toolName === 'generate_sticker' ? 'sticker' : 'image',
    });
  }
  ```

  **Problems with this approach:**

  1. Adding a tool requires edits in multiple places across a 1,100-line function
  2. The `secretTypeToIntegration` map drifts from actual secret definitions
  3. Media job detection duplicates type logic that should live in the media tool
  4. No way for a tool to declare its own post-execution behavior (UI prompt, media job, etc.)

  ### Proposal

  #### Tool metadata on registration

  Extend the MCP tool registry to include execution metadata:

  ```typescript
  interface ToolDefinition {
    name: string;
    description: string;
    inputSchema: ZodSchema;

    // New fields
    category: 'ui_prompt' | 'media_job' | 'background' | 'inline';
    postExecution?: {
      uiPromptType?: string;           // e.g. 'model_selection', 'secret_input'
      mediaJobType?: 'image' | 'video' | 'sticker';
      integration?: string;            // e.g. 'telegram', 'twitter'
    };
  }
  ```

  #### Registry-driven dispatch

  Replace the if/else chain with a registry lookup:

  ```typescript
  // After tool execution
  const toolDef = toolRegistry.get(toolName);

  switch (toolDef.category) {
    case 'ui_prompt':
      return buildUiPrompt(toolDef.postExecution.uiPromptType, result);
    case 'media_job':
      pendingJobs.push({ type: toolDef.postExecution.mediaJobType, ...result });
      break;
    case 'background':
      // Fire and forget
      break;
    case 'inline':
      // Return result directly to LLM
      break;
  }
  ```

  #### Move secret mapping to integration tools

  Each integration tool declares its own secret types:

  ```typescript
  registerTool({
    name: 'configure_telegram',
    category: 'ui_prompt',
    postExecution: { integration: 'telegram' },
    requiredSecrets: ['telegram_bot_token', 'telegram_webhook_secret'],
  });
  ```

  No more global `secretTypeToIntegration` map.

  ### Acceptance Criteria

  - [ ] Tool definitions include `category` and `postExecution` metadata
  - [ ] `chat.ts` tool dispatch is <50 lines (currently ~130 lines of if/else)
  - [ ] `secretTypeToIntegration` map eliminated — tools declare their own secrets
  - [ ] Adding a new tool requires editing only the tool's registration file
  - [ ] All existing tool flows work identically (no user-visible changes)
